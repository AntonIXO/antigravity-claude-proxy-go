syntax = "proto2";

package privacy.context.external;

option java_multiple_files = true;
option objc_class_prefix = "PCEP";

import "storage/datapol/annotations/proto/semantic_annotations.proto";

message ExternalSotMappings {
  message ExternalClientProvidedMapping {
    optional int32 apple_age_range_lower_bound = 1;
    optional int32 apple_age_range_upper_bound = 2;
  }

  optional .privacy.context.external.ExternalSotMappings.ExternalClientProvidedMapping client_provided_mapping = 8;
}

