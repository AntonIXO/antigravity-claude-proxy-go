syntax = "proto2";

package pattributes;

option java_package = "com.google.privacy.pattributes.proto";
option java_multiple_files = true;

import "privacy/pattributes/public/proto/collection_basis.proto";

message CollectionBasisAnd {
  repeated .pattributes.CollectionBasis basis = 1;
  repeated .pattributes.CollectionBasisOr or_spec = 2;
}

message CollectionBasisOr {
  repeated .pattributes.CollectionBasis basis = 1;
  repeated .pattributes.CollectionBasisAnd2 and_spec = 2;
}

message CollectionBasisAnd2 {
  repeated .pattributes.CollectionBasis basis = 1;
  repeated .pattributes.CollectionBasisOr2 or_spec = 2;
}

message CollectionBasisOr2 {
  repeated .pattributes.CollectionBasis basis = 1;
}

