syntax = "proto2";

package proto2;

option java_package = "com.google.protobuf";
option java_outer_classname = "DescriptorProtos";
option go_package = "google.golang.org/protobuf/types/descriptorpb";
option cc_enable_arenas = true;
option objc_class_prefix = "GPB";
option csharp_namespace = "Google.Protobuf.Reflection";

message FileDescriptorSet {
  repeated .proto2.FileDescriptorProto file = 1;
}

message FileDescriptorProto {
  optional string name = 1;
  optional string package = 2;
  repeated string dependency = 3;
  repeated int32 public_dependency = 10;
  repeated int32 weak_dependency = 11;
  repeated string option_dependency = 15;
  repeated .proto2.DescriptorProto message_type = 4;
  repeated .proto2.EnumDescriptorProto enum_type = 5;
  repeated .proto2.ServiceDescriptorProto service = 6;
  repeated .proto2.FieldDescriptorProto extension = 7;
  optional .proto2.FileOptions options = 8;
  optional .proto2.SourceCodeInfo source_code_info = 9;
  optional string syntax = 12;
  optional .proto2.Edition edition = 14;
  optional string edition_deprecated = 13;
}

message DescriptorProto {
  message ExtensionRange {
    optional int32 start = 1;
    optional int32 end = 2;
    optional .proto2.ExtensionRangeOptions options = 3;
  }

  message ReservedRange {
    optional int32 start = 1;
    optional int32 end = 2;
  }

  optional string name = 1;
  repeated .proto2.FieldDescriptorProto field = 2;
  repeated .proto2.FieldDescriptorProto extension = 6;
  repeated .proto2.DescriptorProto nested_type = 3;
  repeated .proto2.EnumDescriptorProto enum_type = 4;
  repeated .proto2.DescriptorProto.ExtensionRange extension_range = 5;
  repeated .proto2.OneofDescriptorProto oneof_decl = 8;
  optional .proto2.MessageOptions options = 7;
  repeated .proto2.DescriptorProto.ReservedRange reserved_range = 9;
  repeated string reserved_name = 10;
  optional .proto2.SymbolVisibility visibility = 11;
}

message ExtensionRangeOptions {
  message Metadata {
    optional string name = 1;
    optional string type = 2;
    optional bool is_repeated = 3;
    optional string full_name = 4;
  }

  message Declaration {
    reserved 4;
    optional int32 number = 1;
    optional string full_name = 2;
    optional string type = 3;
    optional bool reserved = 5;
    optional bool repeated = 6;
  }

  enum VerificationState {
    DECLARATION = 0;
    UNVERIFIED = 1;
  }

  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
  optional .proto2.ExtensionRangeOptions.Metadata metadata = 1;
  repeated .proto2.ExtensionRangeOptions.Declaration declaration = 2;
  optional .proto2.FeatureSet features = 50;
  optional .proto2.ExtensionRangeOptions.VerificationState verification = 3 [default = UNVERIFIED];
}

message FieldDescriptorProto {
  enum Type {
    TYPE_DOUBLE = 1;
    TYPE_FLOAT = 2;
    TYPE_INT64 = 3;
    TYPE_UINT64 = 4;
    TYPE_INT32 = 5;
    TYPE_FIXED64 = 6;
    TYPE_FIXED32 = 7;
    TYPE_BOOL = 8;
    TYPE_STRING = 9;
    TYPE_GROUP = 10;
    TYPE_MESSAGE = 11;
    TYPE_BYTES = 12;
    TYPE_UINT32 = 13;
    TYPE_ENUM = 14;
    TYPE_SFIXED32 = 15;
    TYPE_SFIXED64 = 16;
    TYPE_SINT32 = 17;
    TYPE_SINT64 = 18;
  }

  enum Label {
    LABEL_OPTIONAL = 1;
    LABEL_REPEATED = 3;
    LABEL_REQUIRED = 2;
  }

  optional string name = 1;
  optional int32 number = 3;
  optional .proto2.FieldDescriptorProto.Label label = 4;
  optional .proto2.FieldDescriptorProto.Type type = 5;
  optional string type_name = 6;
  optional string extendee = 2;
  optional string default_value = 7;
  optional int32 oneof_index = 9;
  optional string json_name = 10;
  optional .proto2.FieldOptions options = 8;
  optional bool proto3_optional = 17;
}

message OneofDescriptorProto {
  optional string name = 1;
  optional .proto2.OneofOptions options = 2;
}

message EnumDescriptorProto {
  message EnumReservedRange {
    optional int32 start = 1;
    optional int32 end = 2;
  }

  optional string name = 1;
  repeated .proto2.EnumValueDescriptorProto value = 2;
  optional .proto2.EnumOptions options = 3;
  repeated .proto2.EnumDescriptorProto.EnumReservedRange reserved_range = 4;
  repeated string reserved_name = 5;
  optional .proto2.SymbolVisibility visibility = 6;
}

message EnumValueDescriptorProto {
  optional string name = 1;
  optional int32 number = 2;
  optional .proto2.EnumValueOptions options = 3;
}

message ServiceDescriptorProto {
  reserved "stream";
  reserved 4;
  optional string name = 1;
  repeated .proto2.MethodDescriptorProto method = 2;
  optional .proto2.ServiceOptions options = 3;
}

message MethodDescriptorProto {
  optional string name = 1;
  optional string input_type = 2;
  optional string output_type = 3;
  optional .proto2.MethodOptions options = 4;
  optional bool client_streaming = 5 [default = false];
  optional bool server_streaming = 6 [default = false];
}

message FileOptions {
  reserved "php_generic_services";
  reserved 15;
  reserved 22;
  reserved 25;
  reserved 4;
  reserved 13;
  reserved 21;
  reserved 42;
  reserved 32;
  reserved 33;
  reserved 34;
  reserved 35;
  reserved 49;
  reserved 38;
  enum OptimizeMode {
    SPEED = 1;
    CODE_SIZE = 2;
    LITE_RUNTIME = 3;
  }

  optional int32 cc_api_version = 2 [default = 2];
  optional bool cc_utf8_verification = 24 [default = true];
  optional string java_package = 1;
  optional int32 java_api_version = 5 [default = 2];
  optional bool java_use_javaproto2 = 6 [default = true];
  optional bool java_java5_enums = 7 [default = true];
  optional string java_alt_api_package = 19;
  optional bool java_enable_dual_generate_mutable_api = 26 [default = false];
  optional string java_outer_classname = 8;
  optional string java_outer_classname_proto1 = 51;
  optional bool java_multiple_files = 10 [default = false];
  optional bool java_string_check_utf8 = 27 [default = false];
  optional bool java_mutable_api = 28 [default = true];
  optional string java_multiple_files_mutable_package = 29;
  optional .proto2.FileOptions.OptimizeMode optimize_for = 9 [default = SPEED];
  optional string go_package = 11;
  optional string go_api_flag = 46;
  optional string javascript_package = 12;
  optional int32 szl_api_version = 14 [default = 2];
  optional bool cc_generic_services = 16 [default = false];
  optional bool java_generic_services = 17 [default = false];
  optional bool py_generic_services = 18 [default = false];
  optional bool deprecated = 23 [default = false];
  optional bool cc_enable_arenas = 31 [default = true];
  optional string objc_class_prefix = 36;
  optional string csharp_namespace = 37;
  optional string swift_prefix = 39;
  optional string php_class_prefix = 40;
  optional string php_namespace = 41;
  optional string php_metadata_namespace = 44;
  optional string ruby_package = 45;
  optional bool use_java_stubby_library = 47 [default = true];
  optional bool jspb_use_correct_proto2_semantics = 48 [default = true];
  optional bool py_legacy_stubby_symbols = 52 [default = true];
  optional .proto2.FeatureSet features = 50;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message MessageOptions {
  reserved 4;
  reserved 5;
  reserved 6;
  reserved 8;
  reserved 9;
  optional bool message_set_wire_format = 1 [default = false];
  optional bool no_standard_descriptor_accessor = 2 [default = false];
  optional bool deprecated = 3 [default = false];
  optional bool map_entry = 7;
  optional string go_api_flag = 10;
  optional bool deprecated_legacy_json_field_conflicts = 11;
  optional .proto2.FeatureSet features = 12;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message FieldOptions {
  reserved 4;
  reserved 18;
  message UpgradedOption {
    optional string name = 1;
    optional string value = 2;
  }

  message EditionDefault {
    optional .proto2.Edition edition = 3;
    optional string value = 2;
    optional .proto2.Edition edition_enum = 4;
    optional string edition_deprecated = 1;
  }

  message FeatureSupport {
    optional .proto2.Edition edition_introduced = 1;
    optional .proto2.Edition edition_deprecated = 2;
    optional string deprecation_warning = 3;
    optional .proto2.Edition edition_removed = 4;
    optional string removal_error = 5;
  }

  enum CType {
    STRING = 0;
    CORD = 1;
    STRING_PIECE = 2;
  }

  enum JSType {
    JS_NORMAL = 0;
    JS_STRING = 1;
    JS_NUMBER = 2;
  }

  enum OptionRetention {
    RETENTION_UNKNOWN = 0;
    RETENTION_RUNTIME = 1;
    RETENTION_SOURCE = 2;
  }

  enum OptionTargetType {
    TARGET_TYPE_UNKNOWN = 0;
    TARGET_TYPE_FILE = 1;
    TARGET_TYPE_EXTENSION_RANGE = 2;
    TARGET_TYPE_MESSAGE = 3;
    TARGET_TYPE_FIELD = 4;
    TARGET_TYPE_ONEOF = 5;
    TARGET_TYPE_ENUM = 6;
    TARGET_TYPE_ENUM_ENTRY = 7;
    TARGET_TYPE_SERVICE = 8;
    TARGET_TYPE_METHOD = 9;
  }

  optional .proto2.FieldOptions.CType ctype = 1 [default = STRING];
  optional bool packed = 2;
  optional .proto2.FieldOptions.JSType jstype = 6 [default = JS_NORMAL];
  optional bool lazy = 5 [default = false];
  optional bool unverified_lazy = 15 [default = false];
  optional bool deprecated = 3 [default = false];
  optional bool weak = 10 [default = false];
  repeated .proto2.FieldOptions.UpgradedOption upgraded_option = 11;
  optional bool deprecated_raw_message = 12 [default = false];
  optional bool enforce_utf8 = 13 [default = true];
  optional bool cc_open_enum = 14 [default = false];
  optional bool debug_redact = 16 [default = false];
  optional .proto2.FieldOptions.OptionRetention retention = 17;
  repeated .proto2.FieldOptions.OptionTargetType targets = 19;
  repeated .proto2.FieldOptions.EditionDefault edition_defaults = 20;
  optional .proto2.FeatureSet features = 21;
  optional .proto2.FieldOptions.FeatureSupport feature_support = 22;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message OneofOptions {
  optional .proto2.FeatureSet features = 1;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message EnumOptions {
  reserved 4;
  reserved 5;
  optional string proto1_name = 1;
  optional bool allow_alias = 2;
  optional bool deprecated = 3 [default = false];
  optional bool deprecated_legacy_json_field_conflicts = 6;
  optional .proto2.FeatureSet features = 7;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message EnumValueOptions {
  optional bool deprecated = 1 [default = false];
  optional .proto2.FeatureSet features = 2;
  optional bool debug_redact = 3 [default = false];
  optional .proto2.FieldOptions.FeatureSupport feature_support = 4;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message ServiceOptions {
  reserved 17;
  optional bool multicast_stub = 20 [default = false];
  optional double failure_detection_delay = 16 [default = -1];
  optional .proto2.FeatureSet features = 34;
  optional bool deprecated = 33 [default = false];
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message MethodOptions {
  reserved 18;
  enum Protocol {
    TCP = 0;
    UDP = 1;
  }

  enum SecurityLevel {
    NONE = 0;
    INTEGRITY = 1;
    PRIVACY_AND_INTEGRITY = 2;
    STRONG_PRIVACY_AND_INTEGRITY = 3;
  }

  enum Format {
    UNCOMPRESSED = 0;
    ZIPPY_COMPRESSED = 1;
    GIPFELI_COMPRESSED = 2;
    BROTLI_COMPRESSED = 3;
    ZSTD_COMPRESSED = 4;
  }

  enum LogLevel {
    LOG_NONE = 0;
    LOG_HEADER_ONLY = 1;
    LOG_HEADER_AND_NON_PRIVATE_PAYLOAD_INTERNAL = 2;
    LOG_HEADER_AND_FILTERED_PAYLOAD = 3;
    LOG_HEADER_AND_PAYLOAD = 4;
  }

  enum TokenUnit {
    MESSAGE = 0;
    BYTE = 1;
    BYTEGRACE = 2;
    AUTOMATIC = 3;
  }

  enum IdempotencyLevel {
    IDEMPOTENCY_UNKNOWN = 0;
    NO_SIDE_EFFECTS = 1;
    IDEMPOTENT = 2;
  }

  optional .proto2.MethodOptions.Protocol protocol = 7 [default = TCP];
  optional double deadline = 8 [default = -1];
  optional bool duplicate_suppression = 9 [default = false];
  optional bool fail_fast = 10 [default = false];
  optional bool end_user_creds_requested = 26 [default = false];
  optional sint32 client_logging = 11 [default = 256];
  optional sint32 server_logging = 12 [default = 256];
  optional .proto2.MethodOptions.SecurityLevel security_level = 13 [default = NONE];
  optional .proto2.MethodOptions.SecurityLevel server_required_security_level = 14 [default = STRONG_PRIVACY_AND_INTEGRITY];
  optional .proto2.MethodOptions.Format response_format = 15 [default = UNCOMPRESSED];
  optional .proto2.MethodOptions.Format request_format = 17 [default = UNCOMPRESSED];
  optional string security_label = 19;
  optional bool client_streaming = 20;
  optional bool server_streaming = 21;
  optional string legacy_stream_type = 22;
  optional string legacy_result_type = 23;
  optional bool go_legacy_channel_api = 29;
  optional int64 legacy_client_initial_tokens = 24 [default = -1];
  optional int64 legacy_server_initial_tokens = 25 [default = -1];
  optional int64 client_max_tokens = 30 [default = 16000000];
  optional int64 server_max_tokens = 31 [default = 16000000];
  optional .proto2.MethodOptions.TokenUnit legacy_token_unit = 28 [default = BYTEGRACE];
  optional .proto2.MethodOptions.LogLevel log_level = 27 [default = LOG_HEADER_AND_NON_PRIVATE_PAYLOAD_INTERNAL];
  optional bool deprecated = 33 [default = false];
  optional .proto2.MethodOptions.IdempotencyLevel idempotency_level = 34 [default = IDEMPOTENCY_UNKNOWN];
  optional .proto2.FeatureSet features = 35;
  repeated .proto2.UninterpretedOption uninterpreted_option = 999;
}

message UninterpretedOption {
  message NamePart {
    required string name_part = 1;
    required bool is_extension = 2;
  }

  repeated .proto2.UninterpretedOption.NamePart name = 2;
  optional string identifier_value = 3;
  optional uint64 positive_int_value = 4;
  optional int64 negative_int_value = 5;
  optional double double_value = 6;
  optional bytes string_value = 7;
  optional string aggregate_value = 8;
}

message FeatureSet {
  reserved 999;
  message VisibilityFeature {
    reserved 1 to max;
    enum DefaultSymbolVisibility {
      DEFAULT_SYMBOL_VISIBILITY_UNKNOWN = 0;
      EXPORT_ALL = 1;
      EXPORT_TOP_LEVEL = 2;
      LOCAL_ALL = 3;
      STRICT = 4;
    }

  }

  message ProtoLimitsFeature {
    enum EnforceProtoLimits {
      PROTO_LIMITS_UNKNOWN = 0;
      LEGACY_NO_EXPLICIT_LIMITS = 1;
      PROTO_LIMITS2026 = 2;
    }

  }

  enum FieldPresence {
    FIELD_PRESENCE_UNKNOWN = 0;
    EXPLICIT = 1;
    IMPLICIT = 2;
    LEGACY_REQUIRED = 3;
  }

  enum EnumType {
    ENUM_TYPE_UNKNOWN = 0;
    OPEN = 1;
    CLOSED = 2;
  }

  enum RepeatedFieldEncoding {
    REPEATED_FIELD_ENCODING_UNKNOWN = 0;
    PACKED = 1;
    EXPANDED = 2;
  }

  enum Utf8Validation {
    UTF8_VALIDATION_UNKNOWN = 0;
    UNVERIFIED = 1;
    VERIFY = 2;
    NONE = 3;
  }

  enum MessageEncoding {
    MESSAGE_ENCODING_UNKNOWN = 0;
    LENGTH_PREFIXED = 1;
    DELIMITED = 2;
  }

  enum JsonFormat {
    JSON_FORMAT_UNKNOWN = 0;
    ALLOW = 1;
    LEGACY_BEST_EFFORT = 2;
  }

  enum EnforceNamingStyle {
    ENFORCE_NAMING_STYLE_UNKNOWN = 0;
    STYLE2024 = 1;
    STYLE_LEGACY = 2;
    STYLE2026 = 3;
  }

  optional .proto2.FeatureSet.FieldPresence field_presence = 1;
  optional .proto2.FeatureSet.EnumType enum_type = 2;
  optional .proto2.FeatureSet.RepeatedFieldEncoding repeated_field_encoding = 3;
  optional .proto2.FeatureSet.Utf8Validation utf8_validation = 4;
  optional .proto2.FeatureSet.MessageEncoding message_encoding = 5;
  optional .proto2.FeatureSet.JsonFormat json_format = 6;
  optional .proto2.FeatureSet.EnforceNamingStyle enforce_naming_style = 7;
  optional .proto2.FeatureSet.VisibilityFeature.DefaultSymbolVisibility default_symbol_visibility = 8;
  optional .proto2.FeatureSet.ProtoLimitsFeature.EnforceProtoLimits enforce_proto_limits = 9;
}

message FeatureSetDefaults {
  message FeatureSetEditionDefault {
    optional .proto2.Edition edition = 3;
    optional .proto2.FeatureSet overridable_features = 4;
    optional .proto2.FeatureSet fixed_features = 5;
    optional .proto2.FeatureSet features = 2;
    optional string edition_deprecated = 1;
  }

  repeated .proto2.FeatureSetDefaults.FeatureSetEditionDefault defaults = 1;
  optional string minimum_edition_deprecated = 2;
  optional string maximum_edition_deprecated = 3;
  optional .proto2.Edition minimum_edition = 4;
  optional .proto2.Edition maximum_edition = 5;
}

message SourceCodeInfo {
  message Location {
    repeated int32 path = 1;
    repeated int32 span = 2;
    optional string leading_comments = 3;
    optional string trailing_comments = 4;
    repeated string leading_detached_comments = 6;
  }

  repeated .proto2.SourceCodeInfo.Location location = 1;
}

message GeneratedCodeInfo {
  message Annotation {
    enum Semantic {
      NONE = 0;
      SET = 1;
      ALIAS = 2;
    }

    repeated int32 path = 1;
    optional string source_file = 2;
    optional int32 begin = 3;
    optional int32 end = 4;
    optional .proto2.GeneratedCodeInfo.Annotation.Semantic semantic = 5;
  }

  repeated .proto2.GeneratedCodeInfo.Annotation annotation = 1;
}

enum Edition {
  EDITION_UNKNOWN = 0;
  EDITION_LEGACY = 900;
  EDITION_PROTO2 = 998;
  EDITION_PROTO3 = 999;
  EDITION_2023 = 1000;
  EDITION_2024 = 1001;
  EDITION_2026 = 1002;
  EDITION_UNSTABLE = 9999;
  EDITION_1_TEST_ONLY = 1;
  EDITION_2_TEST_ONLY = 2;
  EDITION_99997_TEST_ONLY = 99997;
  EDITION_99998_TEST_ONLY = 99998;
  EDITION_99999_TEST_ONLY = 99999;
  EDITION_MAX = 2147483647;
}

enum SymbolVisibility {
  VISIBILITY_UNSET = 0;
  VISIBILITY_LOCAL = 1;
  VISIBILITY_EXPORT = 2;
}

