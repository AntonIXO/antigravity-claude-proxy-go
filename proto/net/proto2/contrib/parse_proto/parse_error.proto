edition = "2024";

package proto2.contrib.parse_proto;

import "net/proto2/proto/descriptor.proto";

message ParseError {
  message FieldPath {
    uint32 tag = 1;
    .proto2.FieldDescriptorProto field = 2;
    uint32 field_index = 3;
  }

  enum Type {
    OK = 0;
    BAD_TAG = 1;
    CANNOT_PARSE_FIELD = 2;
    CANNOT_PARSE_MESSAGE_SET_ITEM = 3;
    CANNOT_READ_CORD = 4;
    CANNOT_READ_MESSAGE_FIELD = 5;
    CANNOT_READ_MESSAGE_LENGTH = 6;
    CANNOT_READ_STRING_FIELD = 7;
    ILLEGAL_FIELD_TYPE = 8;
    INVALID_UTF8 = 9;
    LENGTH_EXCEEDS_LIMIT = 10;
    MAX_RECURSION_LIMIT_REACHED = 11;
    NOT_CONSUMED_ENTIRE_MESSAGE = 12;
    UNKNOWN_EXTENSION = 13;
    UNKNOWN_FIELD = 14;
    REQUIRED_FIELD_MISSING = 15;
    UNMATCHED_END_GROUP_TAG = 16;
  }

  .proto2.contrib.parse_proto.ParseError.Type error_type = 1;
  repeated .proto2.contrib.parse_proto.ParseError.FieldPath field_path = 2;
  string full_field_path = 8;
  int64 tag_position = 3;
  int64 position = 4;
  int64 length = 5;
  int64 available = 6;
  int64 total_available = 7;
}

