edition = "2024";

package devtools_jetski_boq_api_proto;

option java_outer_classname = "Api";

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "third_party/gemini_coder/proto/trajectory.proto";
import "third_party/jetski/codeium_common_pb/codeium_common.proto";

service ApiService {
  rpc RecordTrajectoryAnalytics (.devtools_jetski_boq_api_proto.RecordTrajectoryAnalyticsRequest) returns (.devtools_jetski_boq_api_proto.RecordTrajectoryAnalyticsResponse) {}
  rpc ConnectInstance (stream .devtools_jetski_boq_api_proto.ConnectInstanceRequest) returns (stream .devtools_jetski_boq_api_proto.ConnectInstanceResponse) {}
  rpc ConnectInstanceV2 (stream .devtools_jetski_boq_api_proto.ConnectInstanceRequestV2) returns (stream .devtools_jetski_boq_api_proto.ConnectInstanceResponseV2) {}
  rpc ListInstances (.devtools_jetski_boq_api_proto.ListInstancesRequest) returns (.devtools_jetski_boq_api_proto.ListInstancesResponse) {}
  rpc UpdateInstance (.devtools_jetski_boq_api_proto.UpdateInstanceRequest) returns (.devtools_jetski_boq_api_proto.UpdateInstanceResponse) {}
  rpc ProxyCommand (.devtools_jetski_boq_api_proto.ProxyCommandRequest) returns (.devtools_jetski_boq_api_proto.ProxyCommandResponse) {}
  rpc StreamProxyCommand (.devtools_jetski_boq_api_proto.ProxyCommandRequest) returns (stream .devtools_jetski_boq_api_proto.ProxyCommandResponse) {}
  rpc ForwardProxyCommand (.devtools_jetski_boq_api_proto.ProxyCommandRequest) returns (.devtools_jetski_boq_api_proto.ProxyCommandResponse) {}
  rpc ForwardStreamProxyCommand (.devtools_jetski_boq_api_proto.ProxyCommandRequest) returns (stream .devtools_jetski_boq_api_proto.ProxyCommandResponse) {}
}

message RecordTrajectoryAnalyticsRequest {
  .gemini_coder.Trajectory trajectory = 1;
  int32 start_step_index = 2;
  int32 start_generator_metadata_index = 3;
  .exa.codeium_common_pb.Metadata metadata = 4;
  repeated int32 mendel_experiment_ids = 5;
}

message RecordTrajectoryAnalyticsResponse {
}

message InstanceMetadata {
  string name = 1;
  string version = 2;
}

message ConnectInstanceRequest {
  .devtools_jetski_boq_api_proto.InstanceMetadata metadata = 1;
  bytes payload = 2;
  string instance_id = 3;
}

message ConnectInstanceResponse {
  string instance_uuid = 1;
  bytes payload = 2;
}

message ConnectInstanceRequestV2 {
  .devtools_jetski_boq_api_proto.InstanceMetadata metadata = 1;
  string instance_id = 3;
  .devtools_jetski_boq_api_proto.ProxyResponseV2 proxy_response = 4;
}

message ConnectInstanceResponseV2 {
  string instance_uuid = 1;
  .devtools_jetski_boq_api_proto.ProxyRequestV2 proxy_request = 3;
}

message ProxyRequestV2 {
  message HeadersEntry {
    string key = 1;
    string value = 2;
  }

  int64 request_id = 1;
  string rpc_path = 2;
  bytes payload = 3;
  repeated .devtools_jetski_boq_api_proto.ProxyRequestV2.HeadersEntry headers = 4;
}

message ProxyResponseV2 {
  message HeadersEntry {
    string key = 1;
    string value = 2;
  }

  int64 request_id = 1;
  bytes payload = 2;
  int32 status_code = 3;
  repeated .devtools_jetski_boq_api_proto.ProxyResponseV2.HeadersEntry headers = 4;
  bool is_final = 5;
}

message ListInstancesRequest {
  string project = 1;
}

message ListInstancesResponse {
  message InstanceDetails {
    string uuid = 1;
    .devtools_jetski_boq_api_proto.InstanceMetadata metadata = 2;
    .devtools_jetski_boq_api_proto.InstanceStatus status = 3;
    .google.protobuf.Timestamp status_last_updated_at = 4;
  }

  repeated .devtools_jetski_boq_api_proto.ListInstancesResponse.InstanceDetails instances = 1;
}

message UpdateInstanceRequest {
  string instance_id = 1;
  .devtools_jetski_boq_api_proto.InstanceMetadata metadata = 2;
  .google.protobuf.FieldMask update_mask = 3;
}

message UpdateInstanceResponse {
}

message ProxyCommandRequest {
  string target_instance_uuid = 1;
  string rpc_path = 2;
  bytes payload = 3;
}

message ProxyCommandResponse {
  message HeadersEntry {
    string key = 1;
    string value = 2;
  }

  bytes payload = 1;
  repeated .devtools_jetski_boq_api_proto.ProxyCommandResponse.HeadersEntry headers = 2;
}

enum InstanceStatus {
  INSTANCE_STATUS_UNSPECIFIED = 0;
  INSTANCE_STATUS_CONNECTED = 1;
  INSTANCE_STATUS_DISCONNECTED = 2;
  INSTANCE_STATUS_IDLE = 3;
}

