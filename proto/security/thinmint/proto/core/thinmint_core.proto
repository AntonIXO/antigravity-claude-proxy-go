syntax = "proto2";

package thinmint;

option java_package = "com.google.protos.thinmint";

import "google/api/inclusion.proto";
import "third_party/boundary_proxy/proto_compare/annotation.proto";

message ThinMint {
  repeated bytes signature_and_message = 1;
  optional bytes one_hop_message = 2;
  optional bytes chained_verification_key = 3;
}

