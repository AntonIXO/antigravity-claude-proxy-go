syntax = "proto3";

package google.internal.cloud.code.v1internal;

option java_package = "com.google.internal.cloud.code.v1internal";
option java_outer_classname = "CreditsProto";
option java_multiple_files = true;

message Credits {
  enum CreditType {
    CREDIT_TYPE_UNSPECIFIED = 0;
    GOOGLE_ONE_AI = 1;
  }

  .google.internal.cloud.code.v1internal.Credits.CreditType credit_type = 1;
  int64 credit_amount = 2;
  int64 minimum_credit_amount_for_usage = 3;
}

