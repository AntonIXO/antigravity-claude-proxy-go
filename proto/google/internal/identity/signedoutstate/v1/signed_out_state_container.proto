syntax = "proto3";

package google.internal.identity.signedoutstate.v1;

option java_package = "com.google.identity.signedoutstate.v1";
option java_outer_classname = "SignedOutStateContainerProto";
option java_multiple_files = true;
option objc_class_prefix = "SOS";

import "google/internal/identity/signedoutstate/v1/mobile_signed_out_consent.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message SignedOutState {
  string zwieback_token = 1;
  .google.internal.identity.signedoutstate.v1.MobileSignedOutConsent mobile_signed_out_consent = 2;
  bytes rollout_bucket = 3;
}

