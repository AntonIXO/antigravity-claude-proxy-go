syntax = "proto3";

package google.cloud.aiplatform.v1beta1;

option java_package = "com.google.cloud.aiplatform.v1beta1";
option java_outer_classname = "VertexRagDataProto";
option java_multiple_files = true;
option csharp_namespace = "Google.Cloud.AIPlatform.V1Beta1";
option php_namespace = "Google\\Cloud\\AIPlatform\\V1beta1";
option ruby_package = "Google::Cloud::AIPlatform::V1beta1";

import "google/api/field_behavior.proto";
import "google/api/inclusion.proto";
import "google/api/policy.proto";
import "google/api/resource.proto";
import "google/api/versioning.proto";
import "google/api/visibility.proto";
import "google/cloud/aiplatform/common/proto_field_options.proto";
import "google/cloud/aiplatform/v1beta1/api_auth.proto";
import "google/cloud/aiplatform/v1beta1/encryption_spec.proto";
import "google/cloud/aiplatform/v1beta1/io.proto";
import "google/cloud/automl/common/proto_field_options.proto";
import "google/protobuf/timestamp.proto";
import "net/proto2/contrib/validator/annotations.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message RagEmbeddingModelConfig {
  message VertexPredictionEndpoint {
    string endpoint = 1;
    string model = 2;
    string model_version_id = 3;
  }

  message SparseEmbeddingConfig {
    message Bm25 {
      bool multilingual = 1;
      optional float k1 = 2;
      optional float b = 3;
    }

    oneof model {
      .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig.SparseEmbeddingConfig.Bm25 bm25 = 1;
    }
  }

  message HybridSearchConfig {
    .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig.SparseEmbeddingConfig sparse_embedding_config = 1;
    .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig.VertexPredictionEndpoint dense_embedding_model_prediction_endpoint = 2;
  }

  oneof model_config {
    .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig.VertexPredictionEndpoint vertex_prediction_endpoint = 1;
    .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig.HybridSearchConfig hybrid_search_config = 2;
  }
}

message RagVectorDbConfig {
  message RagManagedDb {
    message KNN {
    }

    message ANN {
      int32 tree_depth = 1;
      int32 leaf_count = 2;
    }

    oneof retrieval_strategy {
      .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.RagManagedDb.KNN knn = 1;
      .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.RagManagedDb.ANN ann = 2;
    }
  }

  message Weaviate {
    string http_endpoint = 1;
    string collection_name = 2;
  }

  message Pinecone {
    string index_name = 1;
  }

  message VertexFeatureStore {
    string feature_view_resource_name = 1;
  }

  message VertexVectorSearch {
    string index_endpoint = 1;
    string index = 2;
  }

  message RagManagedVertexVectorSearch {
    string collection_name = 1;
  }

  .google.cloud.aiplatform.v1beta1.ApiAuth api_auth = 5;
  .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig rag_embedding_model_config = 7;
  oneof vector_db {
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.RagManagedDb rag_managed_db = 1;
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.Weaviate weaviate = 2;
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.Pinecone pinecone = 3;
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.VertexFeatureStore vertex_feature_store = 4;
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.VertexVectorSearch vertex_vector_search = 6;
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig.RagManagedVertexVectorSearch rag_managed_vertex_vector_search = 8;
  }
}

message FileStatus {
  enum State {
    STATE_UNSPECIFIED = 0;
    ACTIVE = 1;
    ERROR = 2;
  }

  .google.cloud.aiplatform.v1beta1.FileStatus.State state = 1;
  string error_status = 2;
}

message VertexAiSearchConfig {
  string serving_config = 1;
}

message CorpusStatus {
  enum State {
    UNKNOWN = 0;
    INITIALIZED = 1;
    ACTIVE = 2;
    ERROR = 3;
  }

  .google.cloud.aiplatform.v1beta1.CorpusStatus.State state = 1;
  string error_status = 2;
}

message RagCorpus {
  message CorpusTypeConfig {
    message DocumentCorpus {
    }

    message MemoryCorpus {
      .google.cloud.aiplatform.v1beta1.RagFileParsingConfig.LlmParser llm_parser = 1;
    }

    oneof corpus_type_config {
      .google.cloud.aiplatform.v1beta1.RagCorpus.CorpusTypeConfig.DocumentCorpus document_corpus = 1;
      .google.cloud.aiplatform.v1beta1.RagCorpus.CorpusTypeConfig.MemoryCorpus memory_corpus = 2;
    }
  }

  string name = 1;
  string display_name = 2;
  string description = 3;
  .google.cloud.aiplatform.v1beta1.RagEmbeddingModelConfig rag_embedding_model_config = 6;
  .google.cloud.aiplatform.v1beta1.RagVectorDbConfig rag_vector_db_config = 7;
  .google.protobuf.Timestamp create_time = 4;
  .google.protobuf.Timestamp update_time = 5;
  .google.cloud.aiplatform.v1beta1.CorpusStatus corpus_status = 8;
  int32 rag_files_count = 11;
  .google.cloud.aiplatform.v1beta1.EncryptionSpec encryption_spec = 12;
  .google.cloud.aiplatform.v1beta1.RagCorpus.CorpusTypeConfig corpus_type_config = 13;
  bool satisfies_pzs = 19;
  bool satisfies_pzi = 20;
  oneof backend_config {
    .google.cloud.aiplatform.v1beta1.RagVectorDbConfig vector_db_config = 9;
    .google.cloud.aiplatform.v1beta1.VertexAiSearchConfig vertex_ai_search_config = 10;
  }
}

message RagFile {
  enum RagFileType {
    RAG_FILE_TYPE_UNSPECIFIED = 0;
    RAG_FILE_TYPE_TXT = 1;
    RAG_FILE_TYPE_PDF = 2;
  }

  string name = 1;
  string display_name = 2;
  string description = 3;
  int64 size_bytes = 4;
  .google.cloud.aiplatform.v1beta1.RagFile.RagFileType rag_file_type = 5;
  .google.protobuf.Timestamp create_time = 6;
  .google.protobuf.Timestamp update_time = 7;
  .google.cloud.aiplatform.v1beta1.FileStatus file_status = 13;
  string user_metadata = 15;
  oneof rag_file_source {
    .google.cloud.aiplatform.v1beta1.GcsSource gcs_source = 8;
    .google.cloud.aiplatform.v1beta1.GoogleDriveSource google_drive_source = 9;
    .google.cloud.aiplatform.v1beta1.DirectUploadSource direct_upload_source = 10;
    .google.cloud.aiplatform.v1beta1.SlackSource slack_source = 11;
    .google.cloud.aiplatform.v1beta1.JiraSource jira_source = 12;
    .google.cloud.aiplatform.v1beta1.SharePointSources share_point_sources = 14;
  }
}

message RagChunk {
  message PageSpan {
    int32 first_page = 1;
    int32 last_page = 2;
  }

  string text = 1;
  string file_id = 3;
  string chunk_id = 4;
  optional .google.cloud.aiplatform.v1beta1.RagChunk.PageSpan page_span = 2;
}

message RagFileChunkingConfig {
  message FixedLengthChunking {
    int32 chunk_size = 1;
    int32 chunk_overlap = 2;
  }

  int32 chunk_size = 1;
  int32 chunk_overlap = 2;
  oneof chunking_config {
    .google.cloud.aiplatform.v1beta1.RagFileChunkingConfig.FixedLengthChunking fixed_length_chunking = 3;
  }
}

message RagFileTransformationConfig {
  .google.cloud.aiplatform.v1beta1.RagFileChunkingConfig rag_file_chunking_config = 1;
}

message RagFileParsingConfig {
  reserved 1;
  message AdvancedParser {
    bool use_advanced_pdf_parsing = 1;
  }

  message LayoutParser {
    string processor_name = 1;
    int32 max_parsing_requests_per_min = 2;
    int32 global_max_parsing_requests_per_min = 3;
  }

  message LlmParser {
    string model_name = 1;
    int32 max_parsing_requests_per_min = 2;
    int32 global_max_parsing_requests_per_min = 4;
    string custom_parsing_prompt = 3;
    bool memory_mode = 5;
  }

  bool use_advanced_pdf_parsing = 2;
  oneof parser {
    .google.cloud.aiplatform.v1beta1.RagFileParsingConfig.AdvancedParser advanced_parser = 3;
    .google.cloud.aiplatform.v1beta1.RagFileParsingConfig.LayoutParser layout_parser = 4;
    .google.cloud.aiplatform.v1beta1.RagFileParsingConfig.LlmParser llm_parser = 5;
  }
}

message RagFileMetadataConfig {
  oneof metadata_schema_source {
    .google.cloud.aiplatform.v1beta1.GcsSource gcs_metadata_schema_source = 1;
    .google.cloud.aiplatform.v1beta1.GoogleDriveSource google_drive_metadata_schema_source = 2;
    string inline_metadata_schema_source = 3;
  }
  oneof metadata_source {
    .google.cloud.aiplatform.v1beta1.GcsSource gcs_metadata_source = 4;
    .google.cloud.aiplatform.v1beta1.GoogleDriveSource google_drive_metadata_source = 5;
    string inline_metadata_source = 6;
  }
}

message UploadRagFileConfig {
  .google.cloud.aiplatform.v1beta1.RagFileChunkingConfig rag_file_chunking_config = 1;
  .google.cloud.aiplatform.v1beta1.RagFileTransformationConfig rag_file_transformation_config = 3;
  string inline_metadata = 2;
  .google.cloud.aiplatform.v1beta1.RagFileMetadataConfig rag_file_metadata_config = 4;
  .google.cloud.aiplatform.v1beta1.RagFileParsingConfig rag_file_parsing_config = 5;
  int32 max_embedding_requests_per_min = 6;
  int32 global_max_embedding_requests_per_min = 7;
}

message ImportRagFilesConfig {
  reserved 1;
  .google.cloud.aiplatform.v1beta1.RagFileChunkingConfig rag_file_chunking_config = 4;
  .google.cloud.aiplatform.v1beta1.RagFileTransformationConfig rag_file_transformation_config = 16;
  .google.cloud.aiplatform.v1beta1.RagFileParsingConfig rag_file_parsing_config = 8;
  .google.cloud.aiplatform.v1beta1.RagFileMetadataConfig rag_file_metadata_config = 17;
  int32 max_embedding_requests_per_min = 5;
  int32 global_max_embedding_requests_per_min = 18;
  bool rebuild_ann_index = 19;
  oneof import_source {
    .google.cloud.aiplatform.v1beta1.GcsSource gcs_source = 2;
    .google.cloud.aiplatform.v1beta1.GoogleDriveSource google_drive_source = 3;
    .google.cloud.aiplatform.v1beta1.SlackSource slack_source = 6;
    .google.cloud.aiplatform.v1beta1.JiraSource jira_source = 7;
    .google.cloud.aiplatform.v1beta1.SharePointSources share_point_sources = 13;
  }
  oneof partial_failure_sink {
    .google.cloud.aiplatform.v1beta1.GcsDestination partial_failure_gcs_sink = 11;
    .google.cloud.aiplatform.v1beta1.BigQueryDestination partial_failure_bigquery_sink = 12;
  }
  oneof import_result_sink {
    .google.cloud.aiplatform.v1beta1.GcsDestination import_result_gcs_sink = 14;
    .google.cloud.aiplatform.v1beta1.BigQueryDestination import_result_bigquery_sink = 15;
  }
}

message RagManagedDbConfig {
  message Enterprise {
  }

  message Scaled {
  }

  message Basic {
  }

  message Unprovisioned {
  }

  message Spanner {
    oneof tier {
      .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Scaled scaled = 1;
      .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Basic basic = 2;
      .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Unprovisioned unprovisioned = 3;
    }
  }

  message Serverless {
  }

  oneof tier {
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Enterprise enterprise = 1;
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Scaled scaled = 4;
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Basic basic = 2;
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Unprovisioned unprovisioned = 3;
  }
  oneof mode {
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Serverless serverless = 5;
    .google.cloud.aiplatform.v1beta1.RagManagedDbConfig.Spanner spanner = 6;
  }
}

message RagEngineConfig {
  string name = 1;
  .google.cloud.aiplatform.v1beta1.RagManagedDbConfig rag_managed_db_config = 2;
}

message RagDataSchema {
  string name = 1;
  string key = 2;
  .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails schema_details = 3;
}

message RagMetadataSchemaDetails {
  message ListConfig {
    .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails value_schema = 1;
  }

  message SearchStrategy {
    enum SearchStrategyType {
      SEARCH_STRATEGY_TYPE_UNSPECIFIED = 0;
      NO_SEARCH = 1;
      EXACT_SEARCH = 2;
    }

    optional .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails.SearchStrategy.SearchStrategyType search_strategy_type = 1;
  }

  enum DataType {
    DATA_TYPE_UNSPECIFIED = 0;
    INTEGER = 1;
    FLOAT = 2;
    STRING = 3;
    DATETIME = 4;
    BOOLEAN = 5;
    LIST = 6;
  }

  enum Granularity {
    GRANULARITY_UNSPECIFIED = 0;
    GRANULARITY_FILE_LEVEL = 1;
  }

  .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails.ListConfig list_config = 2;
  optional .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails.DataType type = 1;
  optional .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails.Granularity granularity = 3;
  optional .google.cloud.aiplatform.v1beta1.RagMetadataSchemaDetails.SearchStrategy search_strategy = 4;
}

message RagMetadata {
  string name = 1;
  .google.cloud.aiplatform.v1beta1.UserSpecifiedMetadata user_specified_metadata = 2;
  .google.protobuf.Timestamp create_time = 3;
  .google.protobuf.Timestamp update_time = 4;
}

message UserSpecifiedMetadata {
  string key = 1;
  .google.cloud.aiplatform.v1beta1.MetadataValue value = 2;
}

message MetadataValue {
  oneof value {
    int64 int_value = 1;
    float float_value = 2;
    string str_value = 3;
    string datetime_value = 4;
    bool bool_value = 5;
    .google.cloud.aiplatform.v1beta1.MetadataList list_value = 6;
  }
}

message MetadataList {
  repeated .google.cloud.aiplatform.v1beta1.MetadataValue values = 1;
}

