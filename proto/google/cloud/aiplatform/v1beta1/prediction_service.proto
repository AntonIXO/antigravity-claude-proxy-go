  string operation_name = 2;
}

message InvokeRequest {
  string endpoint = 1;
  string deployed_model_id = 3;
  .google.api.HttpBody http_body = 2;
}

message StreamInvokeRequest {
  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
  string deployed_model_id = 3;
}

message StreamInvokeResponse {
  .google.api.HttpBody http_body = 1;
}

message InvokeApiRequest {
  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
}

message ExplainRequest {
  message ConcurrentExplanationSpecOverrideEntry {
    string key = 1;
    .google.cloud.aiplatform.v1beta1.ExplanationSpecOverride value = 2;
  }

  string endpoint = 1;
  repeated .google.protobuf.Value instances = 2;
  .google.protobuf.Value parameters = 4;
  .google.cloud.aiplatform.v1beta1.ExplanationSpecOverride explanation_spec_override = 5;
  repeated .google.cloud.aiplatform.v1beta1.ExplainRequest.ConcurrentExplanationSpecOverrideEntry concurrent_explanation_spec_override = 6;
  string deployed_model_id = 3;
}

message ExplainResponse {
  message ConcurrentExplanation {
    repeated .google.cloud.aiplatform.v1beta1.Explanation explanations = 1;
  }

  message ConcurrentExplanationsEntry {
    string key = 1;
    .google.cloud.aiplatform.v1beta1.ExplainResponse.ConcurrentExplanation value = 2;
  }

  repeated .google.cloud.aiplatform.v1beta1.Explanation explanations = 1;
  repeated .google.cloud.aiplatform.v1beta1.ExplainResponse.ConcurrentExplanationsEntry concurrent_explanations = 4;
  string deployed_model_id = 2;
  repeated .google.protobuf.Value predictions = 3;
}

message CountTokensRequest {
  string endpoint = 1;
  string model = 3;
  repeated .google.protobuf.Value instances = 2;
