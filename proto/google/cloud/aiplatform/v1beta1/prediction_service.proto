message GenerateContentRequest {
  message LabelsEntry {
    string key = 1;
    string value = 2;
  }

  string endpoint = 1;
  string model = 5;
  repeated .google.cloud.aiplatform.v1beta1.Content contents = 2;
  string cached_content = 9;
  repeated .google.cloud.aiplatform.v1beta1.Tool tools = 6;
  .google.cloud.aiplatform.v1beta1.ToolConfig tool_config = 7;
  repeated .google.cloud.aiplatform.v1beta1.GenerateContentRequest.LabelsEntry labels = 10;
  repeated .google.cloud.aiplatform.v1beta1.SafetySetting safety_settings = 3;
  .google.cloud.aiplatform.v1beta1.ModelArmorConfig model_armor_config = 11;
  .google.cloud.aiplatform.v1beta1.GenerationConfig generation_config = 4;
  string service_account = 12;
  string session_id = 13;
  string uniserve_endpoint_override = 14;
  string global_endpoint_target_location_hint_testing_only = 15;
  optional .google.cloud.aiplatform.v1beta1.Content system_instruction = 8;
  optional .google.cloud.aiplatform.v1beta1.ServiceTier service_tier = 16;
  optional .google.cloud.aiplatform.v1beta1.ContextCacheConfig implicit_cache_config = 17;
}

message GenerateContentResponse {
  message PromptFeedback {
    enum BlockedReason {
      BLOCKED_REASON_UNSPECIFIED = 0;
      SAFETY = 1;
      OTHER = 2;
      BLOCKLIST = 3;
      PROHIBITED_CONTENT = 4;
      MODEL_ARMOR = 5;
      IMAGE_SAFETY = 6;
      JAILBREAK = 7;
    }

    .google.cloud.aiplatform.v1beta1.GenerateContentResponse.PromptFeedback.BlockedReason block_reason = 1;
    repeated .google.cloud.aiplatform.v1beta1.SafetyRating safety_ratings = 2;
    string block_reason_message = 3;
  }

  message UsageMetadata {
    reserved 6;
    message BillablleUsage {
      int32 text_count = 1;
      int32 image_count = 2;
      int32 video_duration_seconds = 3;
      int32 audio_duration_seconds = 4;
    }

    enum TrafficType {
      TRAFFIC_TYPE_UNSPECIFIED = 0;
      ON_DEMAND = 1;
      ON_DEMAND_PRIORITY = 3;
      ON_DEMAND_FLEX = 4;
      PROVISIONED_THROUGHPUT = 2;
    }

    int32 prompt_token_count = 1;
    int32 candidates_token_count = 2;
    int32 total_token_count = 3;
    int32 tool_use_prompt_token_count = 13;
    int32 thoughts_token_count = 14;
    int32 cached_content_token_count = 5;
    repeated .google.cloud.aiplatform.v1beta1.ModalityTokenCount prompt_tokens_details = 9;
    repeated .google.cloud.aiplatform.v1beta1.ModalityTokenCount cache_tokens_details = 10;
    repeated .google.cloud.aiplatform.v1beta1.ModalityTokenCount candidates_tokens_details = 11;
    repeated .google.cloud.aiplatform.v1beta1.ModalityTokenCount tool_use_prompt_tokens_details = 12;
    .google.cloud.aiplatform.v1beta1.GenerateContentResponse.UsageMetadata.TrafficType traffic_type = 8;
    .google.cloud.aiplatform.v1beta1.GenerateContentResponse.UsageMetadata.BillablleUsage billable_prompt_usage = 4;
    .google.cloud.aiplatform.v1beta1.GenerateContentResponse.UsageMetadata.BillablleUsage billable_cached_content_usage = 7;
  }

  message InternalDebugInfo {
    string routed_model_name = 1;
  }

  message ModelLifecycleStatus {
    enum ModelLifecycleStage {
      MODEL_LIFECYCLE_STAGE_UNSPECIFIED = 0;
      EXPERIMENTAL = 1;
      PREVIEW = 2;
      STABLE = 3;
      LEGACY = 4;
      RETIRED = 5;
    }

    .google.cloud.aiplatform.v1beta1.GenerateContentResponse.ModelLifecycleStatus.ModelLifecycleStage model_lifecycle_stage = 1;
    string retirement_date = 2;
    string recommended_upgrade_model = 3;
  }

  repeated .google.cloud.aiplatform.v1beta1.Candidate candidates = 2;
  string model_version = 11;
  .google.protobuf.Timestamp create_time = 12;
  string response_id = 13;
  .google.cloud.aiplatform.v1beta1.GenerateContentResponse.PromptFeedback prompt_feedback = 3;
  .google.cloud.aiplatform.v1beta1.GenerateContentResponse.UsageMetadata usage_metadata = 4;
  .google.protobuf.Timestamp send_time = 10;
  .google.cloud.aiplatform.v1beta1.GenerateContentResponse.InternalDebugInfo internal_debug_info = 14;
  .google.cloud.aiplatform.v1beta1.GenerateContentResponse.ModelLifecycleStatus model_lifecycle_status = 15;
  .google.cloud.aiplatform.v1beta1.LogprobsResult logprobs_result = 16;
}

message CompleteCodeRequest {
  string model = 1;
  repeated .google.cloud.aiplatform.v1beta1.CompleteCodePrompt prompts = 2;
  .google.cloud.aiplatform.v1beta1.CompletionConfig completion_config = 3;
}

message CompleteCodeResponse {
  message Metadata {
    message TokenMetadata {
      int32 total_billable_characters = 1;
      int32 total_tokens = 2;
    }

    .google.cloud.aiplatform.v1beta1.CompleteCodeResponse.Metadata.TokenMetadata output_token_count = 1;
    .google.cloud.aiplatform.v1beta1.CompleteCodeResponse.Metadata.TokenMetadata input_token_count = 2;
  }

  repeated .google.cloud.aiplatform.v1beta1.CompleteCodePrediction candidates = 1;
  string deployed_model_id = 2;
  string model = 3;
  string model_version_id = 4;
  string model_display_name = 5;
  .google.cloud.aiplatform.v1beta1.CompleteCodeResponse.Metadata metadata = 6;
}

message ChatCompletionsRequest {
  message ExtraBody {
    message ModelSafetySettings {
      message LlamaGuardSettings {
      }

      bool enabled = 1;
      oneof settings {
        .google.cloud.aiplatform.v1beta1.ChatCompletionsRequest.ExtraBody.ModelSafetySettings.LlamaGuardSettings llama_guard_settings = 2;
      }
    }

    repeated .google.cloud.aiplatform.v1beta1.ChatCompletionsRequest.ExtraBody.ModelSafetySettings model_safety_settings = 1;
    repeated .google.cloud.aiplatform.v1beta1.SafetySetting safety_settings = 3;
    string thought_tag_marker = 4;
    string cached_content = 5;
    .google.cloud.aiplatform.v1beta1.GenerationConfig.ThinkingConfig thinking_config = 6;
    string session_id = 7;
    repeated .google.cloud.aiplatform.v1beta1.Tool tools = 8;
    .google.cloud.aiplatform.v1beta1.GenerationConfig.MediaResolution media_resolution = 9;
    bool stream_function_call_arguments = 10;
    .google.cloud.aiplatform.v1beta1.ContextCacheConfig implicit_cache_config = 11;
    oneof retrieval_source {
      .google.cloud.aiplatform.v1beta1.VertexRagStore vertex_rag_store = 2;
    }
  }

  message ExtraPart {
    reserved 1;
    bytes thought_signature = 3;
    oneof metadata {
      .google.cloud.aiplatform.v1beta1.VideoMetadata video_metadata = 4;
    }
    optional bool thought = 2;
  }

  message PerChoiceResponseExtraProperties {
    .google.cloud.aiplatform.v1beta1.GroundingMetadata grounding_metadata = 1;
  }

  message ResponseExtraProperties {
  }

  message ExtraToolPart {
    repeated .google.cloud.aiplatform.v1beta1.FunctionResponsePart parts = 1;
  }

  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
}

message PredictLongRunningResponse {
  oneof response {
    .google.cloud.aiplatform.v1beta1.GenerateVideoResponse generate_video_response = 1;
  }
}

message PredictLongRunningMetadata {
}

