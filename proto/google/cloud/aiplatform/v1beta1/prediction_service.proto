  string method_name = 2;
  bytes input = 3;
  .google.protobuf.Timestamp send_time = 4;
}

message DirectRawPredictResponse {
  bytes output = 1;
  .google.protobuf.Timestamp send_time = 2;
}

message StreamDirectPredictRequest {
  string endpoint = 1;
  repeated .google.cloud.aiplatform.v1beta1.Tensor inputs = 2;
  .google.cloud.aiplatform.v1beta1.Tensor parameters = 3;
  .google.protobuf.Timestamp send_time = 4;
}

message StreamDirectPredictResponse {
  repeated .google.cloud.aiplatform.v1beta1.Tensor outputs = 1;
  .google.cloud.aiplatform.v1beta1.Tensor parameters = 2;
  .google.protobuf.Timestamp send_time = 3;
}

message StreamDirectRawPredictRequest {
  string endpoint = 1;
  string method_name = 2;
  bytes input = 3;
  .google.protobuf.Timestamp send_time = 4;
}

message StreamDirectRawPredictResponse {
  bytes output = 1;
  .google.protobuf.Timestamp send_time = 2;
}

message StreamingPredictRequest {
  string endpoint = 1;
  repeated .google.cloud.aiplatform.v1beta1.Tensor inputs = 2;
  .google.cloud.aiplatform.v1beta1.Tensor parameters = 3;
  .google.protobuf.Timestamp send_time = 4;
}

message StreamingPredictResponse {
  repeated .google.cloud.aiplatform.v1beta1.Tensor outputs = 1;
  .google.cloud.aiplatform.v1beta1.Tensor parameters = 2;
  .google.protobuf.Timestamp send_time = 3;
}

message StreamingRawPredictRequest {
  string endpoint = 1;
  string method_name = 2;
  bytes input = 3;
  .google.protobuf.Timestamp send_time = 4;
}

message StreamingRawPredictResponse {
  bytes output = 1;
  .google.protobuf.Timestamp send_time = 2;
}

message PredictLongRunningRequest {
  message LabelsEntry {
    string key = 1;
    string value = 2;
  }

  string endpoint = 1;
  repeated .google.protobuf.Value instances = 2;
  .google.protobuf.Value parameters = 3;
  repeated .google.cloud.aiplatform.v1beta1.PredictLongRunningRequest.LabelsEntry labels = 4;
}

message RawPredictLongRunningRequest {
  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
}

message FetchPredictOperationRequest {
