  optional .google.cloud.aiplatform.v1beta1.GenerationConfig generation_config = 7;
}

message CountTokensResponse {
  int32 total_tokens = 1;
  int32 total_billable_characters = 2;
  repeated .google.cloud.aiplatform.v1beta1.ModalityTokenCount prompt_tokens_details = 3;
}

message TestGrpcPredictRequest {
