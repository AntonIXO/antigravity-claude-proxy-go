service PredictionService {
  rpc Predict (.google.cloud.aiplatform.v1beta1.PredictRequest) returns (.google.cloud.aiplatform.v1beta1.PredictResponse) {}
  rpc RawPredict (.google.cloud.aiplatform.v1beta1.RawPredictRequest) returns (.google.api.HttpBody) {}
  rpc StreamRawPredict (.google.cloud.aiplatform.v1beta1.StreamRawPredictRequest) returns (stream .google.api.HttpBody) {}
  rpc DirectPredict (.google.cloud.aiplatform.v1beta1.DirectPredictRequest) returns (.google.cloud.aiplatform.v1beta1.DirectPredictResponse) {}
  rpc DirectRawPredict (.google.cloud.aiplatform.v1beta1.DirectRawPredictRequest) returns (.google.cloud.aiplatform.v1beta1.DirectRawPredictResponse) {}
  rpc StreamDirectPredict (stream .google.cloud.aiplatform.v1beta1.StreamDirectPredictRequest) returns (stream .google.cloud.aiplatform.v1beta1.StreamDirectPredictResponse) {}
  rpc StreamDirectRawPredict (stream .google.cloud.aiplatform.v1beta1.StreamDirectRawPredictRequest) returns (stream .google.cloud.aiplatform.v1beta1.StreamDirectRawPredictResponse) {}
  rpc StreamingPredict (stream .google.cloud.aiplatform.v1beta1.StreamingPredictRequest) returns (stream .google.cloud.aiplatform.v1beta1.StreamingPredictResponse) {}
  rpc ServerStreamingPredict (.google.cloud.aiplatform.v1beta1.StreamingPredictRequest) returns (stream .google.cloud.aiplatform.v1beta1.StreamingPredictResponse) {}
  rpc StreamingRawPredict (stream .google.cloud.aiplatform.v1beta1.StreamingRawPredictRequest) returns (stream .google.cloud.aiplatform.v1beta1.StreamingRawPredictResponse) {}
  rpc PredictLongRunning (.google.cloud.aiplatform.v1beta1.PredictLongRunningRequest) returns (.google.longrunning.Operation) {}
  rpc FetchPredictOperation (.google.cloud.aiplatform.v1beta1.FetchPredictOperationRequest) returns (.google.longrunning.Operation) {}
  rpc Invoke (.google.cloud.aiplatform.v1beta1.InvokeRequest) returns (stream .google.api.HttpBody) {}
  rpc InvokeApi (.google.cloud.aiplatform.v1beta1.InvokeApiRequest) returns (stream .google.api.HttpBody) {}
  rpc GetResponse (.google.cloud.aiplatform.v1beta1.GetResponseRequest) returns (.google.api.HttpBody) {}
  rpc DeleteResponse (.google.cloud.aiplatform.v1beta1.DeleteResponseRequest) returns (.google.api.HttpBody) {}
  rpc Explain (.google.cloud.aiplatform.v1beta1.ExplainRequest) returns (.google.cloud.aiplatform.v1beta1.ExplainResponse) {}
  rpc CountTokens (.google.cloud.aiplatform.v1beta1.CountTokensRequest) returns (.google.cloud.aiplatform.v1beta1.CountTokensResponse) {}
  rpc GenerateContent (.google.cloud.aiplatform.v1beta1.GenerateContentRequest) returns (.google.cloud.aiplatform.v1beta1.GenerateContentResponse) {}
  rpc StreamGenerateContent (.google.cloud.aiplatform.v1beta1.GenerateContentRequest) returns (stream .google.cloud.aiplatform.v1beta1.GenerateContentResponse) {}
  rpc ChatCompletions (.google.cloud.aiplatform.v1beta1.ChatCompletionsRequest) returns (stream .google.api.HttpBody) {}
  rpc EmbedContent (.google.cloud.aiplatform.v1beta1.EmbedContentRequest) returns (.google.cloud.aiplatform.v1beta1.EmbedContentResponse) {}
}

message PredictRequest {
  message LabelsEntry {
    string key = 1;
    string value = 2;
  }

  string endpoint = 1;
  repeated .google.protobuf.Value instances = 2;
  .google.protobuf.Value parameters = 3;
  repeated .google.cloud.aiplatform.v1beta1.PredictRequest.LabelsEntry labels = 4;
}

message PredictResponse {
  repeated .google.protobuf.Value predictions = 1;
  string deployed_model_id = 2;
  string model = 3;
  string model_version_id = 5;
  string model_display_name = 4;
  .google.protobuf.Value metadata = 6;
}

message RawPredictRequest {
  reserved 3;
  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
}

message StreamRawPredictRequest {
  reserved 3;
  string endpoint = 1;
  .google.api.HttpBody http_body = 2;
}

message DirectPredictRequest {
