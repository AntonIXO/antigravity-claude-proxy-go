syntax = "proto3";

package google.cloud.aiplatform.v1beta1;

option java_package = "com.google.cloud.aiplatform.v1beta1";
option java_outer_classname = "TypesProto";
option java_multiple_files = true;
option csharp_namespace = "Google.Cloud.AIPlatform.V1Beta1";
option php_namespace = "Google\\Cloud\\AIPlatform\\V1beta1";
option ruby_package = "Google::Cloud::AIPlatform::V1beta1";

import "google/api/versioning.proto";
import "google/api/visibility.proto";

message BoolArray {
  repeated bool values = 1;
}

message DoubleArray {
  repeated double values = 1;
}

message Int64Array {
  repeated int64 values = 1;
}

message StringArray {
  repeated string values = 1;
}

message Tensor {
  reserved 4;
  message StructValEntry {
    string key = 1;
    .google.cloud.aiplatform.v1beta1.Tensor value = 2;
  }

  enum DataType {
    DATA_TYPE_UNSPECIFIED = 0;
    BOOL = 1;
    STRING = 2;
    FLOAT = 3;
    DOUBLE = 4;
    INT8 = 5;
    INT16 = 6;
    INT32 = 7;
    INT64 = 8;
    UINT8 = 9;
    UINT16 = 10;
    UINT32 = 11;
    UINT64 = 12;
  }

  .google.cloud.aiplatform.v1beta1.Tensor.DataType dtype = 1;
  repeated int64 shape = 2;
  repeated bool bool_val = 3;
  repeated string string_val = 14;
  repeated bytes bytes_val = 15;
  repeated float float_val = 5;
  repeated double double_val = 6;
  repeated int32 int_val = 7;
  repeated int64 int64_val = 8;
  repeated uint32 uint_val = 9;
  repeated uint64 uint64_val = 10;
  repeated .google.cloud.aiplatform.v1beta1.Tensor list_val = 11;
  repeated .google.cloud.aiplatform.v1beta1.Tensor.StructValEntry struct_val = 12;
  bytes tensor_val = 13;
}

