syntax = "proto3";

package google.cloud.aiplatform.v1beta1;

option java_package = "com.google.cloud.aiplatform.v1beta1";
option java_outer_classname = "CachedContentProto";
option java_multiple_files = true;
option csharp_namespace = "Google.Cloud.AIPlatform.V1Beta1";
option php_namespace = "Google\\Cloud\\AIPlatform\\V1beta1";
option ruby_package = "Google::Cloud::AIPlatform::V1beta1";

import "google/api/field_behavior.proto";
import "google/api/inclusion.proto";
import "google/api/policy.proto";
import "google/api/resource.proto";
import "google/api/versioning.proto";
import "google/api/visibility.proto";
import "google/cloud/aiplatform/common/proto_field_options.proto";
import "google/cloud/aiplatform/v1beta1/content.proto";
import "google/cloud/aiplatform/v1beta1/encryption_spec.proto";
import "google/cloud/aiplatform/v1beta1/tool.proto";
import "google/cloud/automl/common/proto_field_options.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "net/proto2/contrib/validator/annotations.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message CachedContent {
  message UsageMetadata {
    int32 total_token_count = 1;
    int32 text_count = 2;
    int32 image_count = 3;
    int32 video_duration_seconds = 4;
    int32 audio_duration_seconds = 5;
  }

  string name = 1;
  string display_name = 11;
  string model = 2;
  .google.cloud.aiplatform.v1beta1.Content system_instruction = 3;
  repeated .google.cloud.aiplatform.v1beta1.Content contents = 4;
  repeated .google.cloud.aiplatform.v1beta1.Tool tools = 5;
  .google.cloud.aiplatform.v1beta1.ToolConfig tool_config = 6;
  .google.protobuf.Timestamp create_time = 7;
  .google.protobuf.Timestamp update_time = 8;
  .google.cloud.aiplatform.v1beta1.CachedContent.UsageMetadata usage_metadata = 12;
  .google.cloud.aiplatform.v1beta1.EncryptionSpec encryption_spec = 13;
  oneof expiration {
    .google.protobuf.Timestamp expire_time = 9;
    .google.protobuf.Duration ttl = 10;
  }
}

message ContextCacheConfig {
  message EphemeralRetention {
  }

  message DurableRetention {
  }

  oneof retention_config {
    .google.cloud.aiplatform.v1beta1.ContextCacheConfig.EphemeralRetention ephemeral_retention = 1;
    .google.cloud.aiplatform.v1beta1.ContextCacheConfig.DurableRetention durable_retention = 2;
  }
}

