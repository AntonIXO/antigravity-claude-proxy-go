  .google.cloud.aiplatform.master.GenerateContentResponse.UsageMetadata usage_metadata = 4;
  .google.protobuf.Timestamp send_time = 10;
  .google.cloud.aiplatform.master.GenerateContentResponse.InternalDebugInfo internal_debug_info = 14;
  .google.cloud.aiplatform.master.GenerateContentResponse.ModelLifecycleStatus model_lifecycle_status = 15;
  .google.cloud.aiplatform.master.LogprobsResult logprobs_result = 16;
