  rpc InvokeApi (.google.cloud.aiplatform.master.InvokeApiRequest) returns (stream .google.api.HttpBody) {}
  rpc GetResponse (.google.cloud.aiplatform.master.GetResponseRequest) returns (.google.api.HttpBody) {}
  rpc DeleteResponse (.google.cloud.aiplatform.master.DeleteResponseRequest) returns (.google.api.HttpBody) {}
  rpc Explain (.google.cloud.aiplatform.master.ExplainRequest) returns (.google.cloud.aiplatform.master.ExplainResponse) {}
