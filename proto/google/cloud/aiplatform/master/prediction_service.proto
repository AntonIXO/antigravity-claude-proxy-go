  }

  message ModelLifecycleStatus {
    enum ModelLifecycleStage {
      MODEL_LIFECYCLE_STAGE_UNSPECIFIED = 0;
      EXPERIMENTAL = 1;
      PREVIEW = 2;
      STABLE = 3;
      LEGACY = 4;
      RETIRED = 5;
