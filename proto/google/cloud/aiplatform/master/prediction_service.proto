    .google.cloud.aiplatform.master.GenerateContentResponse.UsageMetadata.BillablleUsage billable_prompt_usage = 4;
    .google.cloud.aiplatform.master.GenerateContentResponse.UsageMetadata.BillablleUsage billable_cached_content_usage = 7;
  }

  message InternalDebugInfo {
