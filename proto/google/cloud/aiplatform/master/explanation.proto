syntax = "proto3";

package google.cloud.aiplatform.master;

option java_package = "com.google.cloud.aiplatform.master";
option java_outer_classname = "ExplanationProto";
option java_multiple_files = true;
option csharp_namespace = "Google.Cloud.AIPlatform.Master";
option php_namespace = "Google\\Cloud\\AIPlatform\\Master";
option ruby_package = "Google::Cloud::AIPlatform::Master";

import "google/api/field_behavior.proto";
import "google/api/policy.proto";
import "google/api/versioning.proto";
import "google/api/visibility.proto";
import "google/cloud/aiplatform/master/explanation_metadata.proto";
import "google/cloud/aiplatform/master/io.proto";
import "google/protobuf/struct.proto";
import "net/proto2/contrib/validator/annotations.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message Explanation {
  repeated .google.cloud.aiplatform.master.Attribution attributions = 1;
  repeated .google.cloud.aiplatform.master.Neighbor neighbors = 2;
}

message ModelExplanation {
  repeated .google.cloud.aiplatform.master.Attribution mean_attributions = 1;
}

message Attribution {
  double baseline_output_value = 1;
  double instance_output_value = 2;
  .google.protobuf.Value feature_attributions = 3;
  repeated int32 output_index = 4;
  string output_display_name = 5;
  double approximation_error = 6;
  string output_name = 7;
}

message Neighbor {
  string neighbor_id = 1;
  double neighbor_distance = 2;
}

message ExplanationSpec {
  .google.cloud.aiplatform.master.ExplanationParameters parameters = 1;
  .google.cloud.aiplatform.master.ExplanationMetadata metadata = 2;
}

message ExplanationParameters {
  int32 top_k = 4;
  .google.protobuf.ListValue output_indices = 5;
  .google.cloud.aiplatform.master.ForecastingParameters forecasting_parameters = 6;
  oneof method {
    .google.cloud.aiplatform.master.SampledShapleyAttribution sampled_shapley_attribution = 1;
    .google.cloud.aiplatform.master.IntegratedGradientsAttribution integrated_gradients_attribution = 2;
    .google.cloud.aiplatform.master.XraiAttribution xrai_attribution = 3;
    .google.cloud.aiplatform.master.Examples examples = 7;
  }
}

message SampledShapleyAttribution {
  int32 path_count = 1;
}

message IntegratedGradientsAttribution {
  int32 step_count = 1;
  .google.cloud.aiplatform.master.SmoothGradConfig smooth_grad_config = 2;
  .google.cloud.aiplatform.master.BlurBaselineConfig blur_baseline_config = 3;
}

message XraiAttribution {
  int32 step_count = 1;
  .google.cloud.aiplatform.master.SmoothGradConfig smooth_grad_config = 2;
  .google.cloud.aiplatform.master.BlurBaselineConfig blur_baseline_config = 3;
}

message ForecastingParameters {
  message InputBaselineTableConfig {
    oneof source {
      .google.cloud.aiplatform.master.GcsSource gcs_source = 1;
      .google.cloud.aiplatform.master.BigQuerySource bigquery_source = 2;
    }
  }

  repeated .google.cloud.aiplatform.master.ForecastingParameters.InputBaselineTableConfig input_baseline_table_config = 1;
}

message SmoothGradConfig {
  int32 noisy_sample_count = 3;
  oneof GradientNoiseSigma {
    float noise_sigma = 1;
    .google.cloud.aiplatform.master.FeatureNoiseSigma feature_noise_sigma = 2;
  }
}

message FeatureNoiseSigma {
  message NoiseSigmaForFeature {
    string name = 1;
    float sigma = 2;
  }

  repeated .google.cloud.aiplatform.master.FeatureNoiseSigma.NoiseSigmaForFeature noise_sigma = 1;
}

message BlurBaselineConfig {
  float max_blur_sigma = 1;
}

message Examples {
  message ExampleGcsSource {
    enum DataFormat {
      DATA_FORMAT_UNSPECIFIED = 0;
      JSONL = 1;
    }

    .google.cloud.aiplatform.master.Examples.ExampleGcsSource.DataFormat data_format = 1;
    .google.cloud.aiplatform.master.GcsSource gcs_source = 2;
  }

  .google.cloud.aiplatform.master.GcsSource gcs_source = 1;
  int32 neighbor_count = 3;
  oneof source {
    .google.cloud.aiplatform.master.Examples.ExampleGcsSource example_gcs_source = 5;
  }
  oneof config {
    .google.protobuf.Value nearest_neighbor_search_config = 2;
    .google.cloud.aiplatform.master.Presets presets = 4;
  }
}

message Presets {
  enum Query {
    PRECISE = 0;
    FAST = 1;
  }

  enum Modality {
    MODALITY_UNSPECIFIED = 0;
    IMAGE = 1;
    TEXT = 2;
    TABULAR = 3;
  }

  .google.cloud.aiplatform.master.Presets.Modality modality = 2;
  optional .google.cloud.aiplatform.master.Presets.Query query = 1;
}

message ExplanationSpecOverride {
  .google.cloud.aiplatform.master.ExplanationParameters parameters = 1;
  .google.cloud.aiplatform.master.ExplanationMetadataOverride metadata = 2;
  .google.cloud.aiplatform.master.ExamplesOverride examples_override = 3;
}

message ExplanationMetadataOverride {
  message InputMetadataOverride {
    repeated .google.protobuf.Value input_baselines = 1;
    .google.cloud.aiplatform.master.ExplanationMetadata.InputMetadata.Visualization visualization = 2;
    string group_name = 3;
  }

  message InputsEntry {
    string key = 1;
    .google.cloud.aiplatform.master.ExplanationMetadataOverride.InputMetadataOverride value = 2;
  }

  repeated .google.cloud.aiplatform.master.ExplanationMetadataOverride.InputsEntry inputs = 1;
}

message ExamplesOverride {
  enum DataFormat {
    DATA_FORMAT_UNSPECIFIED = 0;
    INSTANCES = 1;
    EMBEDDINGS = 2;
  }

  int32 neighbor_count = 1;
  int32 crowding_count = 2;
  repeated .google.cloud.aiplatform.master.ExamplesRestrictionsNamespace restrictions = 3;
  bool return_embeddings = 4;
  .google.cloud.aiplatform.master.ExamplesOverride.DataFormat data_format = 5;
}

message ExamplesRestrictionsNamespace {
  string namespace_name = 1;
  repeated string allow = 2;
  repeated string deny = 3;
}

