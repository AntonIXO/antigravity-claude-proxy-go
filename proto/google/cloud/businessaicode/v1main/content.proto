syntax = "proto3";

package google.cloud.businessaicode.v1main;

option java_package = "com.google.cloud.businessaicode.v1main";
option java_outer_classname = "ContentProto";
option java_multiple_files = true;

import "google/api/field_behavior.proto";
import "google/api/versioning.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "net/proto2/contrib/validator/annotations.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message AiCodeConfig {
  message AdditionalContent {
    repeated .google.cloud.businessaicode.v1main.FileEdit file_edits = 1;
  }

  string experience = 1;
  repeated .google.cloud.businessaicode.v1main.SourceFile files = 3;
  optional .google.cloud.businessaicode.v1main.AiCodeConfig.AdditionalContent additional_content = 4;
}

message Content {
  repeated .google.cloud.businessaicode.v1main.Part parts = 1;
  string role = 2;
}

message Part {
  bool thought = 9;
  bytes thought_signature = 10;
  oneof data {
    string text = 1;
    .google.cloud.businessaicode.v1main.Blob inline_data = 2;
    .google.cloud.businessaicode.v1main.FileData file_data = 3;
    .google.cloud.businessaicode.v1main.FunctionCall function_call = 4;
    .google.cloud.businessaicode.v1main.FunctionResponse function_response = 5;
    .google.cloud.businessaicode.v1main.ExecutableCode executable_code = 6;
    .google.cloud.businessaicode.v1main.CodeExecutionResult code_execution_result = 7;
  }
  oneof metadata {
    .google.cloud.businessaicode.v1main.VideoMetadata video_metadata = 8;
  }
}

message Blob {
  string mime_type = 1;
  bytes data = 2;
}

message FileData {
  string mime_type = 1;
  string file_uri = 2;
}

message FunctionCall {
  string name = 1;
  .google.protobuf.Struct args = 2;
  string id = 3;
}

message FunctionResponse {
  string name = 1;
  .google.protobuf.Struct response = 2;
  string id = 3;
  repeated .google.cloud.businessaicode.v1main.FunctionResponsePart parts = 4;
}

message FunctionResponsePart {
  oneof data {
    .google.cloud.businessaicode.v1main.FunctionResponseBlob inline_data = 1;
  }
}

message FunctionResponseBlob {
  string mime_type = 1;
  bytes data = 2;
}

message Tool {
  message EnterpriseWebSearch {
    repeated string exclude_domains = 1;
    .google.cloud.businessaicode.v1main.Tool.PhishBlockThreshold blocking_confidence = 2;
  }

  enum PhishBlockThreshold {
    PHISH_BLOCK_THRESHOLD_UNSPECIFIED = 0;
    BLOCK_LOW_AND_ABOVE = 30;
    BLOCK_MEDIUM_AND_ABOVE = 40;
    BLOCK_HIGH_AND_ABOVE = 50;
    BLOCK_HIGHER_AND_ABOVE = 55;
    BLOCK_VERY_HIGH_AND_ABOVE = 60;
    BLOCK_ONLY_EXTREMELY_HIGH = 100;
  }

  repeated .google.cloud.businessaicode.v1main.FunctionDeclaration function_declarations = 1;
  .google.cloud.businessaicode.v1main.Tool.EnterpriseWebSearch enterprise_web_search = 8;
}

message FunctionDeclaration {
  string name = 1;
  string description = 2;
  .google.cloud.businessaicode.v1main.Schema parameters = 3;
  optional .google.protobuf.Value parameters_json_schema = 6;
  optional .google.cloud.businessaicode.v1main.Schema response = 4;
  optional .google.protobuf.Value response_json_schema = 7;
}

message Schema {
  message PropertiesEntry {
    string key = 1;
    .google.cloud.businessaicode.v1main.Schema value = 2;
  }

  .google.cloud.businessaicode.v1main.Type type = 1;
  string format = 2;
  string description = 3;
  bool nullable = 4;
  repeated string enum = 5;
  .google.cloud.businessaicode.v1main.Schema items = 6;
  repeated .google.cloud.businessaicode.v1main.Schema.PropertiesEntry properties = 7;
  repeated string required = 8;
  string title = 15;
  .google.protobuf.Value default = 16;
  int64 min_items = 17;
  int64 max_items = 18;
  int64 min_properties = 19;
  int64 max_properties = 20;
  repeated string property_ordering = 21;
  repeated .google.cloud.businessaicode.v1main.Schema any_of = 22;
  optional double minimum = 9;
  optional double maximum = 10;
  optional int64 min_length = 11;
  optional int64 max_length = 12;
  optional string pattern = 13;
  optional .google.protobuf.Value example = 14;
}

message ToolConfig {
  .google.cloud.businessaicode.v1main.FunctionCallingConfig function_calling_config = 1;
}

message FunctionCallingConfig {
  enum Mode {
    MODE_UNSPECIFIED = 0;
    AUTO = 1;
    ANY = 2;
    NONE = 3;
  }

  .google.cloud.businessaicode.v1main.FunctionCallingConfig.Mode mode = 1;
  repeated string allowed_function_names = 2;
}

message SafetySetting {
  enum HarmBlockMethod {
    HARM_BLOCK_METHOD_UNSPECIFIED = 0;
    SEVERITY = 1;
    PROBABILITY = 2;
  }

  .google.cloud.businessaicode.v1main.HarmCategory category = 1;
  .google.cloud.businessaicode.v1main.HarmBlockThreshold threshold = 2;
  .google.cloud.businessaicode.v1main.SafetySetting.HarmBlockMethod method = 3;
}

message GenerationConfig {
  message ThinkingConfig {
    enum ThinkingLevel {
      THINKING_LEVEL_UNSPECIFIED = 0;
      LOW = 1;
      MEDIUM = 2;
      HIGH = 3;
      MINIMAL = 4;
    }

    optional bool include_thoughts = 1;
    optional int32 thinking_budget = 2;
    optional .google.cloud.businessaicode.v1main.GenerationConfig.ThinkingConfig.ThinkingLevel thinking_level = 3;
  }

  enum Modality {
    MODALITY_UNSPECIFIED = 0;
    TEXT = 1;
    IMAGE = 2;
    AUDIO = 3;
  }

  enum MediaResolution {
    MEDIA_RESOLUTION_UNSPECIFIED = 0;
    MEDIA_RESOLUTION_LOW = 1;
    MEDIA_RESOLUTION_MEDIUM = 2;
    MEDIA_RESOLUTION_HIGH = 3;
  }

  repeated string stop_sequences = 2;
  .google.cloud.businessaicode.v1main.GenerationConfig.ThinkingConfig thinking_config = 14;
  repeated .google.cloud.businessaicode.v1main.GenerationConfig.Modality response_modalities = 17;
  .google.cloud.businessaicode.v1main.GenerationConfig.MediaResolution media_resolution = 18;
  optional int32 candidate_count = 1;
  optional int32 max_output_tokens = 4;
  optional float temperature = 5;
  optional float top_p = 6;
  optional float top_k = 7;
  optional int32 seed = 8;
  optional string response_mime_type = 9;
  optional .google.cloud.businessaicode.v1main.Schema response_schema = 10;
  optional .google.protobuf.Value response_json_schema = 11;
  optional float presence_penalty = 12;
  optional float frequency_penalty = 13;
  optional bool response_logprobs = 15;
  optional int32 logprobs = 16;
}

message Candidate {
  int32 index = 1;
  .google.cloud.businessaicode.v1main.Content content = 2;
  .google.cloud.businessaicode.v1main.FinishReason finish_reason = 3;
  repeated .google.cloud.businessaicode.v1main.SafetyRating safety_ratings = 4;
  .google.cloud.businessaicode.v1main.CitationMetadata citation_metadata = 5;
  .google.cloud.businessaicode.v1main.GroundingMetadata grounding_metadata = 7;
  double avg_logprobs = 8;
  .google.cloud.businessaicode.v1main.UrlContextMetadata url_context_metadata = 10;
  .google.cloud.businessaicode.v1main.AiCodeOutput aicode_output = 1001;
  optional string finish_message = 6;
}

message AiCodeOutput {
  message DerivedContent {
    oneof content {
      .google.cloud.businessaicode.v1main.OutputSourceFile file = 3;
      .google.cloud.businessaicode.v1main.CodeBlock code_block = 4;
      .google.cloud.businessaicode.v1main.TextBlock text_block = 5;
      .google.cloud.businessaicode.v1main.PredictionMetadata prediction_metadata = 6;
    }
    optional int32 start_index = 1;
    optional int32 end_index = 2;
  }

  repeated .google.cloud.businessaicode.v1main.AiCodeOutput.DerivedContent contents = 1;
}

message OutputSourceFile {
  string file_uri = 1;
  string content = 2;
}

message TextBlock {
  string content = 1;
}

message PredictionMetadata {
  double score = 1;
  double classifier_score = 2;
}

message SafetyRating {
  .google.cloud.businessaicode.v1main.HarmCategory category = 1;
  .google.cloud.businessaicode.v1main.HarmProbability probability = 2;
  bool blocked = 3;
}

message CitationMetadata {
  repeated .google.cloud.businessaicode.v1main.Citation citations = 1;
}

message Citation {
  int32 start_index = 1;
  int32 end_index = 2;
  string uri = 3;
  string license = 4;
}

message ExecutableCode {
  enum Language {
    LANGUAGE_UNSPECIFIED = 0;
    PYTHON = 1;
  }

  .google.cloud.businessaicode.v1main.ExecutableCode.Language language = 1;
  string code = 2;
}

message CodeExecutionResult {
  enum Outcome {
    OUTCOME_UNSPECIFIED = 0;
    OUTCOME_OK = 1;
    OUTCOME_FAILED = 2;
    OUTCOME_DEADLINE_EXCEEDED = 3;
  }

  .google.cloud.businessaicode.v1main.CodeExecutionResult.Outcome outcome = 1;
  string output = 2;
}

message VideoMetadata {
  .google.protobuf.Duration start_offset = 1;
  .google.protobuf.Duration end_offset = 2;
  double fps = 3;
}

message GroundingMetadata {
  message SearchEntryPoint {
    string rendered_content = 1;
    bytes sdk_blob = 2;
  }

  message GroundingChunk {
    message Web {
      optional string uri = 1;
      optional string title = 2;
    }

    oneof chunk_type {
      .google.cloud.businessaicode.v1main.GroundingMetadata.GroundingChunk.Web web = 1;
    }
  }

  message GroundingSupport {
    repeated int32 grounding_chunk_indices = 2;
    repeated float confidence_scores = 3;
    optional .google.cloud.businessaicode.v1main.GroundingMetadata.Segment segment = 1;
  }

  message Segment {
    int32 part_index = 1;
    int32 start_index = 2;
    int32 end_index = 3;
    string text = 4;
  }

  repeated string web_search_queries = 1;
  repeated .google.cloud.businessaicode.v1main.GroundingMetadata.GroundingChunk grounding_chunks = 3;
  repeated .google.cloud.businessaicode.v1main.GroundingMetadata.GroundingSupport grounding_supports = 4;
  optional .google.cloud.businessaicode.v1main.GroundingMetadata.SearchEntryPoint search_entry_point = 2;
  optional .google.cloud.businessaicode.v1main.RetrievalMetadata retrieval_metadata = 5;
}

message RetrievalMetadata {
  float google_search_dynamic_retrieval_score = 1;
}

message UrlContextMetadata {
  repeated .google.cloud.businessaicode.v1main.UrlMetadata url_metadata = 1;
}

message UrlMetadata {
  enum UrlRetrievalStatus {
    URL_RETRIEVAL_STATUS_UNSPECIFIED = 0;
    URL_RETRIEVAL_STATUS_SUCCESS = 1;
    URL_RETRIEVAL_STATUS_ERROR = 2;
  }

  string retrieved_url = 1;
  .google.cloud.businessaicode.v1main.UrlMetadata.UrlRetrievalStatus url_retrieval_status = 2;
}

message ModalityTokenCount {
  .google.cloud.businessaicode.v1main.Modality modality = 1;
  int32 token_count = 2;
}

message CodeBlock {
  string content = 1;
  string programming_language = 2;
}

message SourceFile {
  message FileSegment {
    string content = 1;
    bool is_selected = 2;
  }

  enum InclusionReason {
    INCLUSION_REASON_UNSPECIFIED = 0;
    ACTIVE = 1;
    OPEN = 2;
    RECENTLY_CLOSED = 3;
    RECENTLY_EDITED = 4;
    COLOCATED = 5;
    RELATED = 6;
    USER_SELECTED = 7;
  }

  repeated .google.cloud.businessaicode.v1main.SourceFile.InclusionReason inclusion_reason = 1;
  string file_uri = 2;
  repeated .google.cloud.businessaicode.v1main.SourceFile.FileSegment segments = 4;
  optional string programming_language = 3;
}

message FileEdit {
  enum EditType {
    EDIT_TYPE_UNSPECIFIED = 0;
    TYPED = 1;
    PASTED = 2;
    AI_GENERATED = 3;
  }

  string file_uri = 1;
  repeated .google.cloud.businessaicode.v1main.CodeEdit edit = 2;
  .google.cloud.businessaicode.v1main.FileEdit.EditType edit_type = 3;
}

message CodeEdit {
  int32 start_line = 1;
  int32 end_line = 2;
  repeated .google.cloud.businessaicode.v1main.DiffLine lines = 3;
}

message DiffLine {
  string text = 1;
  .google.cloud.businessaicode.v1main.DiffChangeType type = 2;
  .google.cloud.businessaicode.v1main.CharacterDiff character_diff = 3;
}

message CharacterDiff {
  repeated .google.cloud.businessaicode.v1main.CharacterDiffChange changes = 1;
}

message CharacterDiffChange {
  string text = 1;
  .google.cloud.businessaicode.v1main.DiffChangeType type = 2;
}

message Model {
  string model_id = 1;
  string display_name = 2;
  string description = 3;
}

enum DiffChangeType {
  DIFF_CHANGE_TYPE_UNSPECIFIED = 0;
  INSERT = 1;
  DELETE = 2;
  UNCHANGED = 3;
}

enum Type {
  TYPE_UNSPECIFIED = 0;
  STRING = 1;
  NUMBER = 2;
  INTEGER = 3;
  BOOLEAN = 4;
  ARRAY = 5;
  OBJECT = 6;
  NULL = 7;
}

enum HarmCategory {
  HARM_CATEGORY_UNSPECIFIED = 0;
  HARM_CATEGORY_HARASSMENT = 7;
  HARM_CATEGORY_HATE_SPEECH = 8;
  HARM_CATEGORY_SEXUALLY_EXPLICIT = 9;
  HARM_CATEGORY_DANGEROUS_CONTENT = 10;
}

enum HarmProbability {
  HARM_PROBABILITY_UNSPECIFIED = 0;
  NEGLIGIBLE = 1;
  LOW = 2;
  MEDIUM = 3;
  HIGH = 4;
}

enum HarmBlockThreshold {
  HARM_BLOCK_THRESHOLD_UNSPECIFIED = 0;
  BLOCK_LOW_AND_ABOVE = 1;
  BLOCK_MEDIUM_AND_ABOVE = 2;
  BLOCK_ONLY_HIGH = 3;
  BLOCK_NONE = 4;
  OFF = 5;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  STOP = 1;
  MAX_TOKENS = 2;
  SAFETY = 3;
  RECITATION = 4;
  OTHER = 5;
  BLOCKLIST = 6;
  PROHIBITED_CONTENT = 7;
  SPII = 8;
  MALFORMED_FUNCTION_CALL = 9;
  IMAGE_SAFETY = 10;
  IMAGE_PROHIBITED_CONTENT = 11;
  IMAGE_RECITATION = 12;
  IMAGE_OTHER = 13;
  UNEXPECTED_TOOL_CALL = 14;
  NO_IMAGE = 15;
}

enum Modality {
  MODALITY_UNSPECIFIED = 0;
  TEXT = 1;
  IMAGE = 2;
  VIDEO = 3;
  AUDIO = 4;
  DOCUMENT = 5;
}

