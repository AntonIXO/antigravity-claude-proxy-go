syntax = "proto3";

package google.rpc;

option java_package = "com.google.rpc";
option java_outer_classname = "ErrorDetailsProto";
option java_multiple_files = true;
option go_package = "google.golang.org/genproto/googleapis/rpc/errdetails;errdetails";
option objc_class_prefix = "RPC";

import "google/protobuf/duration.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";
import "third_party/boundary_proxy/proto_compare/annotation.proto";

message ErrorInfo {
  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  string reason = 1;
  string domain = 2;
  repeated .google.rpc.ErrorInfo.MetadataEntry metadata = 3;
}

message RetryInfo {
  .google.protobuf.Duration retry_delay = 1;
}

message DebugInfo {
  repeated string stack_entries = 1;
  string detail = 2;
}

message QuotaFailure {
  message Violation {
    message QuotaDimensionsEntry {
      string key = 1;
      string value = 2;
    }

    string subject = 1;
    string description = 2;
    string api_service = 3;
    string quota_metric = 4;
    string quota_id = 5;
    repeated .google.rpc.QuotaFailure.Violation.QuotaDimensionsEntry quota_dimensions = 6;
    int64 quota_value = 7;
    optional int64 future_quota_value = 8;
  }

  repeated .google.rpc.QuotaFailure.Violation violations = 1;
}

message PreconditionFailure {
  message Violation {
    string type = 1;
    string subject = 2;
    string description = 3;
  }

  repeated .google.rpc.PreconditionFailure.Violation violations = 1;
}

message BadRequest {
  message FieldViolation {
    string field = 1;
    string description = 2;
    string reason = 3;
    .google.rpc.LocalizedMessage localized_message = 4;
  }

  repeated .google.rpc.BadRequest.FieldViolation field_violations = 1;
}

message RequestInfo {
  string request_id = 1;
  string serving_data = 2;
}

message ResourceInfo {
  string resource_type = 1;
  string resource_name = 2;
  string owner = 3;
  string description = 4;
}

message Help {
  message Link {
    string description = 1;
    string url = 2;
  }

  repeated .google.rpc.Help.Link links = 1;
}

message LocalizedMessage {
  string locale = 1;
  string message = 2;
}

