syntax = "proto3";

package google.rpc.context;

option java_package = "com.google.rpc.context";
option java_outer_classname = "ProjectContextProto";
option java_multiple_files = true;
option objc_class_prefix = "RPC";

import "google/protobuf/timestamp.proto";

message ProjectContext {
  message PropertiesEntry {
    string key = 1;
    .google.rpc.context.ProjectProperty value = 2;
  }

  uint64 project_number = 1;
  string project_id = 3;
  repeated .google.rpc.context.ProjectContext.PropertiesEntry properties = 2;
  .google.protobuf.Timestamp read_time = 4;
}

message ProjectProperty {
  repeated string values = 1;
}

