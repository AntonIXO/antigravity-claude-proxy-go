syntax = "proto3";

package google.rpc.context;

option java_package = "com.google.rpc.context";
option java_outer_classname = "HttpHeaderContextProto";
option java_multiple_files = true;
option objc_class_prefix = "RPC";

import "java/com/google/apps/jspb/jspb_disable_randomization.proto";

message HttpHeaderContext {
  message HeadersEntry {
    string key = 1;
    string value = 2;
  }

  repeated .google.rpc.context.HttpHeaderContext.HeadersEntry headers = 1;
  string request_path = 2;
  int32 response_code = 3;
  string request_firstline = 4;
}

