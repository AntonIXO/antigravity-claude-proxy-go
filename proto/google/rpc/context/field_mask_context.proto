syntax = "proto3";

package google.rpc.context;

option java_package = "com.google.rpc.context";
option java_outer_classname = "FieldMaskContextProto";
option java_multiple_files = true;
option objc_class_prefix = "RPC";

import "google/protobuf/field_mask.proto";

message FieldMaskContext {
  .google.protobuf.FieldMask request_mask = 1;
  .google.protobuf.FieldMask response_mask = 2;
}

