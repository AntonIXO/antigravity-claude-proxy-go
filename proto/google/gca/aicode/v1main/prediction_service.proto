    enum StartSensitivity {
      START_SENSITIVITY_UNSPECIFIED = 0;
      START_SENSITIVITY_HIGH = 1;
      START_SENSITIVITY_LOW = 2;
    }

    enum EndSensitivity {
      END_SENSITIVITY_UNSPECIFIED = 0;
