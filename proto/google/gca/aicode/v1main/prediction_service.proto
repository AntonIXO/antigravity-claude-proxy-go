  .google.gca.aicode.v1main.Blob video = 3;
  .google.gca.aicode.v1main.BidiGenerateContentRealtimeInput.ActivityStart activity_start = 5;
  .google.gca.aicode.v1main.BidiGenerateContentRealtimeInput.ActivityEnd activity_end = 6;
  optional bool audio_stream_end = 2;
  optional string text = 4;
}

