  string model = 1;
  .google.gca.aicode.v1main.GenerationConfig generation_config = 2;
  .google.gca.aicode.v1main.Content system_instruction = 3;
  repeated .google.gca.aicode.v1main.Tool tools = 4;
  .google.gca.aicode.v1main.RealtimeInputConfig realtime_input_config = 5;
  .google.gca.aicode.v1main.SessionResumptionConfig session_resumption = 6;
  .google.gca.aicode.v1main.ContextWindowCompressionConfig context_window_compression = 7;
  .google.gca.aicode.v1main.AudioTranscriptionConfig input_audio_transcription = 8;
  .google.gca.aicode.v1main.AudioTranscriptionConfig output_audio_transcription = 9;
  .google.gca.aicode.v1main.ProactivityConfig proactivity = 10;
  .google.gca.aicode.v1main.HistoryConfig history_config = 11;
  repeated .google.gca.aicode.v1main.AsrContext asr_context = 12;
}

message BidiGenerateContentClientContent {
  repeated .google.gca.aicode.v1main.Content turns = 1;
  bool turn_complete = 2;
}

