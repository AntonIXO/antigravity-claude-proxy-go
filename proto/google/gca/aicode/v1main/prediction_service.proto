  bool interrupted = 4;
  .google.gca.aicode.v1main.GroundingMetadata grounding_metadata = 5;
  .google.gca.aicode.v1main.BidiGenerateContentTranscription input_transcription = 6;
  .google.gca.aicode.v1main.BidiGenerateContentTranscription undecided_input_transcription = 11;
  .google.gca.aicode.v1main.BidiGenerateContentTranscription output_transcription = 7;
