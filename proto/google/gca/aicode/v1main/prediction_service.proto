    }

    optional bool disabled = 1;
    optional .google.gca.aicode.v1main.RealtimeInputConfig.AutomaticActivityDetection.StartSensitivity start_of_speech_sensitivity = 2;
    optional int32 prefix_padding_ms = 3;
    optional .google.gca.aicode.v1main.RealtimeInputConfig.AutomaticActivityDetection.EndSensitivity end_of_speech_sensitivity = 4;
    optional int32 silence_duration_ms = 5;
  }

  enum TurnCoverage {
