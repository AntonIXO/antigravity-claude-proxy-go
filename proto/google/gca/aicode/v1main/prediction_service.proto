  .google.gca.aicode.v1main.RealtimeInputConfig.AutomaticActivityDetection automatic_activity_detection = 6;
  optional .google.gca.aicode.v1main.ActivityHandling activity_handling = 7;
  optional .google.gca.aicode.v1main.RealtimeInputConfig.TurnCoverage turn_coverage = 4;
