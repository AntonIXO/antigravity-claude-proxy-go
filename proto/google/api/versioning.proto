syntax = "proto2";

package google.api;

option java_package = "com.google.api";
option java_outer_classname = "VersioningProto";
option java_multiple_files = true;
option go_package = "google.golang.org/genproto/googleapis/api/annotations;annotations";
option objc_class_prefix = "GAPI";

import "net/proto2/proto/descriptor.proto";

message VersioningRule {
  optional string selector = 1;
  optional string restriction = 2;
}

message VersioningFileInfo {
  optional string original_name = 1;
  optional string original_proto_package = 2;
  optional string new_api_version = 3;
  optional .proto2.FileOptions original_file_options = 4;
}

