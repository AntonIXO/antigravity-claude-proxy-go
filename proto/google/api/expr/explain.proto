syntax = "proto3";

package google.api.expr;

option java_package = "com.google.api.expr";
option java_outer_classname = "ExplainProto";
option java_multiple_files = true;
option go_package = "google.golang.org/genproto/googleapis/api/expr;expr";

import "google/api/expr/value.proto";

message Explain {
  message ExprStep {
    int64 id = 1;
    int32 value_index = 2;
  }

  repeated .google.api.expr.Value values = 1;
  repeated .google.api.expr.Explain.ExprStep expr_steps = 2;
}

