syntax = "proto2";

package google.api;

option java_package = "com.google.api";
option java_outer_classname = "ClientProto";
option java_multiple_files = true;
option go_package = "google.golang.org/genproto/googleapis/api/annotations;annotations";
option objc_class_prefix = "GAPI";

import "google/api/inclusion.proto";
import "google/api/launch_stage.proto";
import "google/api/policy.proto";
import "google/api/visibility.proto";
import "google/protobuf/duration.proto";
import "net/proto2/proto/descriptor.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";

message CommonLanguageSettings {
  optional string reference_docs_uri = 1;
  repeated .google.api.ClientLibraryDestination destinations = 2;
  optional .google.api.SelectiveGapicGeneration selective_gapic_generation = 3;
}

message ClientLibrarySettings {
  reserved 5 to 20;
  optional string version = 1;
  optional .google.api.LaunchStage launch_stage = 2;
  optional bool rest_numeric_enums = 3;
  optional string bundle = 4;
  optional .google.api.JavaSettings java_settings = 21;
  optional .google.api.CppSettings cpp_settings = 22;
  optional .google.api.PhpSettings php_settings = 23;
  optional .google.api.PythonSettings python_settings = 24;
  optional .google.api.NodeSettings node_settings = 25;
  optional .google.api.DotnetSettings dotnet_settings = 26;
  optional .google.api.RubySettings ruby_settings = 27;
  optional .google.api.GoSettings go_settings = 28;
}

message Publishing {
  reserved 3 to 10;
  reserved 12 to 100;
  reserved 108;
  optional .google.protobuf.Duration publishing_delay = 1;
  repeated .google.api.MethodSettings method_settings = 2;
  optional string bug_assignee_email = 11;
  optional string new_issue_uri = 101;
  optional string documentation_uri = 102;
  optional string api_short_name = 103;
  optional string github_label = 104;
  repeated string codeowner_github_teams = 105;
  optional string doc_tag_prefix = 106;
  optional .google.api.ClientLibraryOrganization organization = 107;
  repeated .google.api.ClientLibrarySettings library_settings = 109;
  optional string proto_reference_documentation_uri = 110;
  optional string rest_reference_documentation_uri = 111;
}

message JavaSettings {
  message ServiceClassNamesEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional string library_package = 1;
  repeated .google.api.JavaSettings.ServiceClassNamesEntry service_class_names = 2;
  optional .google.api.CommonLanguageSettings common = 3;
}

message CppSettings {
  optional .google.api.CommonLanguageSettings common = 1;
}

message PhpSettings {
  optional .google.api.CommonLanguageSettings common = 1;
  optional string library_package = 2;
}

message PythonSettings {
  message ExperimentalFeatures {
    optional bool rest_async_io_enabled = 1;
    optional bool protobuf_pythonic_types_enabled = 2;
    optional bool unversioned_package_disabled = 3;
  }

  optional .google.api.CommonLanguageSettings common = 1;
  optional .google.api.PythonSettings.ExperimentalFeatures experimental_features = 2;
}

message NodeSettings {
  optional .google.api.CommonLanguageSettings common = 1;
}

message DotnetSettings {
  message RenamedServicesEntry {
    optional string key = 1;
    optional string value = 2;
  }

  message RenamedResourcesEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional .google.api.CommonLanguageSettings common = 1;
  repeated .google.api.DotnetSettings.RenamedServicesEntry renamed_services = 2;
  repeated .google.api.DotnetSettings.RenamedResourcesEntry renamed_resources = 3;
  repeated string ignored_resources = 4;
  repeated string forced_namespace_aliases = 5;
  repeated string handwritten_signatures = 6;
}

message RubySettings {
  optional .google.api.CommonLanguageSettings common = 1;
}

message GoSettings {
  message RenamedServicesEntry {
    optional string key = 1;
    optional string value = 2;
  }

  optional .google.api.CommonLanguageSettings common = 1;
  repeated .google.api.GoSettings.RenamedServicesEntry renamed_services = 2;
}

message MethodSettings {
  message LongRunning {
    optional .google.protobuf.Duration initial_poll_delay = 1;
    optional float poll_delay_multiplier = 2;
    optional .google.protobuf.Duration max_poll_delay = 3;
    optional .google.protobuf.Duration total_poll_timeout = 4;
  }

  optional string selector = 1;
  optional .google.api.MethodSettings.LongRunning long_running = 2;
  repeated string auto_populated_fields = 3;
  optional .google.api.BatchingConfigProto batching = 4;
}

message SelectiveGapicGeneration {
  repeated string methods = 1;
  optional bool generate_omitted_as_internal = 2;
  optional bool as_deny_list = 3;
}

message BatchingConfigProto {
  optional .google.api.BatchingSettingsProto thresholds = 1;
  optional .google.api.BatchingDescriptorProto batch_descriptor = 2;
}

message BatchingSettingsProto {
  optional int32 element_count_threshold = 1;
  optional int64 request_byte_threshold = 2;
  optional .google.protobuf.Duration delay_threshold = 3;
  optional int32 element_count_limit = 4;
  optional int32 request_byte_limit = 5;
  optional int32 flow_control_element_limit = 6;
  optional int32 flow_control_byte_limit = 7;
  optional .google.api.FlowControlLimitExceededBehaviorProto flow_control_limit_exceeded_behavior = 8;
}

message BatchingDescriptorProto {
  optional string batched_field = 1;
  repeated string discriminator_fields = 2;
  optional string subresponse_field = 3;
}

enum ClientLibraryOrganization {
  CLIENT_LIBRARY_ORGANIZATION_UNSPECIFIED = 0;
  CLOUD = 1;
  ADS = 2;
  PHOTOS = 3;
  STREET_VIEW = 4;
  SHOPPING = 5;
  GEO = 6;
  GENERATIVE_AI = 7;
  HEALTH = 8;
}

enum ClientLibraryDestination {
  CLIENT_LIBRARY_DESTINATION_UNSPECIFIED = 0;
  GITHUB = 10;
  PACKAGE_MANAGER = 20;
}

enum FlowControlLimitExceededBehaviorProto {
  UNSET_BEHAVIOR = 0;
  THROW_EXCEPTION = 1;
  BLOCK = 2;
  IGNORE = 3;
}

