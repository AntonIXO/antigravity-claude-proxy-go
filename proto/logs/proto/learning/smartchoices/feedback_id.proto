syntax = "proto2";

package smartchoices;

option java_package = "com.google.smartchoices.client";
option java_multiple_files = true;

import "storage/datapol/annotations/proto/semantic_annotations.proto";

message FeedbackId {
  optional uint64 id_low_bits = 1;
  optional uint64 id_high_bits = 2;
}

