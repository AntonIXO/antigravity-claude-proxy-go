syntax = "proto2";

package pb;

option java_package = "com.google.protobuf";
option java_outer_classname = "GoFeaturesProto";
option go_package = "google.golang.org/protobuf/types/gofeaturespb";

import "net/proto2/proto/descriptor.proto";

message GoFeatures {
  message OptimizeModeFeature {
    enum OptimizeMode {
      OPTIMIZE_MODE_UNSPECIFIED = 0;
      SPEED = 1;
      CODE_SIZE = 2;
    }

  }

  enum APILevel {
    API_LEVEL_UNSPECIFIED = 0;
    API_OPEN = 1;
    API_HYBRID = 2;
    API_OPAQUE = 3;
  }

  enum StripEnumPrefix {
    STRIP_ENUM_PREFIX_UNSPECIFIED = 0;
    STRIP_ENUM_PREFIX_KEEP = 1;
    STRIP_ENUM_PREFIX_GENERATE_BOTH = 2;
    STRIP_ENUM_PREFIX_STRIP = 3;
  }

  optional bool legacy_unmarshal_json_enum = 1;
  optional .pb.GoFeatures.APILevel api_level = 2;
  optional .pb.GoFeatures.StripEnumPrefix strip_enum_prefix = 3;
  optional .pb.GoFeatures.OptimizeModeFeature.OptimizeMode optimize_mode = 4;
}

