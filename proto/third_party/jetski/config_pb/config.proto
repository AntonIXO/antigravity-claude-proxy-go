syntax = "proto3";

package exa.config_pb;

option java_package = "com.exafunction.codeium.config";
option java_multiple_files = true;

import "third_party/jetski/cortex_pb/cortex.proto";
import "third_party/jetski/jetbox_state_pb/jetbox_state.proto";

message UserConfig {
  message SidecarsEntry {
    string key = 1;
    .exa.cortex_pb.SidecarUserConfig value = 2;
  }

  repeated .exa.config_pb.UserConfig.SidecarsEntry sidecars = 1;
  .jetbox_state_pb.UserSettings user_settings = 2;
}

