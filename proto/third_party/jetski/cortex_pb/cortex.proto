syntax = "proto3";

package exa.cortex_pb;

option java_package = "com.exafunction.codeium.cortex";
option java_multiple_files = true;

import "google/internal/cloud/code/v1internal/credits.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "storage/datapol/annotations/proto/semantic_annotations.proto";
import "third_party/jetski/browser_pb/browser.proto";
import "third_party/jetski/hooks_pb/hooks.proto";
import "third_party/jetski/chat_client_server_pb/chat_client_server.proto";
import "third_party/jetski/chat_pb/chat.proto";
import "third_party/jetski/codeium_common_pb/codeium_common.proto";
import "third_party/jetski/context_module_pb/context_module.proto";
import "third_party/jetski/diff_action_pb/diff_action.proto";
import "third_party/jetski/opensearch_clients_pb/opensearch_clients.proto";

message WorkflowSpec {
  string path = 1;
  string name = 2;
  string description = 3;
  string content = 4;
  bool turbo = 5;
  bool is_builtin = 6;
  .exa.cortex_pb.CortexMemoryScope scope = 7;
  string base_dir = 8;
  bool disable_model_invocation = 9;
  string plugin_name = 10;
}

message CortexPlanSummaryComponent {
  oneof component {
    string text = 1;
    .exa.codeium_common_pb.ContextScopeItem citation = 2;
  }
}

message CodingStepState {
  string plan_id = 1;
  string goal = 2;
  repeated .exa.cortex_pb.ActionState action_states = 3;
  repeated .exa.cortex_pb.CortexStepOutline outlines = 7;
  repeated .exa.cortex_pb.CortexPlanSummaryComponent summary_components = 8;
  string post_summary_text = 9;
  bool plan_fully_generated = 4;
  bool plan_finished = 5;
  .exa.cortex_pb.PlanDebugInfo debug_info = 6;
  bool plan_summary_confirmed = 10;
  bool plan_summary_fully_generated = 11;
  repeated .exa.context_module_pb.CciWithSubrangeWithRetrievalMetadata cci_list = 12;
}

message CortexPlanState {
  repeated .exa.cortex_pb.CortexStepState steps = 1;
  repeated .exa.cortex_pb.CortexStepOutline outlines = 2;
  uint32 current_step_index = 3;
  .exa.cortex_pb.PlanDebugInfo debug_info = 4;
}

message CortexStepOutline {
  uint32 step_number = 1;
  string action_name = 2;
  string json_args = 3;
  repeated uint32 parent_step_numbers = 4;
}

message CortexStepState {
  oneof step {
    .exa.cortex_pb.CodingStepState coding = 1;
  }
}

message CortexResearchState {
  uint32 total_retrieved_count = 1;
  repeated .exa.codeium_common_pb.CciWithSubrange top_retrieved_items = 2;
  .exa.cortex_pb.ResearchDebugInfo debug_info = 3;
  repeated .exa.codeium_common_pb.CciWithSubrange full_cci_list = 4;
}

message ResearchDebugInfo {
  string query = 1;
  repeated string files_scanned = 2;
}

message CortexWorkflowState {
  .exa.cortex_pb.CortexRequestSource request_source = 6;
  string goal = 1;
  .exa.cortex_pb.PlanInput plan_input = 2;
  .exa.cortex_pb.CortexResearchState research_state = 3;
  .exa.cortex_pb.CortexPlanState plan_state = 4;
  string error = 5;
}

message CortexRunState {
  .exa.cortex_pb.CortexWorkflowState workflow_state = 1;
  .exa.codeium_common_pb.GraphExecutionState execution_state = 2;
  bool done = 3;
}

message PlanInput {
  string goal = 1;
  repeated string next_steps = 5;
  repeated string target_directories = 2;
  repeated string target_files = 3;
  repeated .exa.codeium_common_pb.ContextScopeItem scope_items = 4;
}

message ActionSpec {
  repeated uint32 parent_step_indices = 3;
  oneof spec {
    .exa.cortex_pb.ActionSpecCommand command = 1;
    .exa.cortex_pb.ActionSpecCreateFile create_file = 2;
    .exa.cortex_pb.ActionSpecDeleteFile delete_file = 4;
    .exa.cortex_pb.ActionSpecSed sed = 5;
  }
}

message ActionSpecCreateFile {
  string instruction = 1;
  .exa.codeium_common_pb.PathScopeItem path = 2;
  repeated .exa.codeium_common_pb.CodeContextItem reference_ccis = 3;
  bool overwrite = 4;
}

message ActionSpecDeleteFile {
  .exa.codeium_common_pb.PathScopeItem path = 1;
}

message ActionSpecSed {
  message FileContentEntry {
    string key = 1;
    string value = 2;
  }

  repeated string expressions = 1;
  .exa.codeium_common_pb.PathScopeItem path = 3;
  repeated .exa.cortex_pb.ActionSpecSed.FileContentEntry file_content = 2;
}

message LineRangeTarget {
  string absolute_uri = 1;
  uint32 start_line = 2;
  uint32 end_line = 3;
}

message CommandContentTarget {
  string content = 1;
  string absolute_uri = 2;
}

message ReplacementChunk {
  string target_content = 1;
  string replacement_content = 2;
  bool allow_multiple = 3;
  bool target_has_carriage_return = 4;
  repeated string context_lines = 5;
  int32 start_line = 6;
  int32 end_line = 7;
  .exa.cortex_pb.AcknowledgementType acknowledgement_type = 11;
  int32 index = 12;
}

message ActionSpecCommand {
  string instruction = 1;
  repeated .exa.cortex_pb.ReplacementChunk replacement_chunks = 9;
  bool is_edit = 2;
  bool use_fast_apply = 8;
  repeated .exa.codeium_common_pb.CodeContextItem reference_ccis = 5;
  string classification = 11;
  .exa.cortex_pb.InteractiveCascadeEditImportance importance = 12;
  oneof target {
    .exa.codeium_common_pb.CodeContextItem code_context = 3;
    .exa.codeium_common_pb.PathScopeItem file = 4;
    .exa.codeium_common_pb.CciWithSubrange cci_with_subrange = 6;
    .exa.cortex_pb.LineRangeTarget line_range = 7;
    .exa.cortex_pb.CommandContentTarget content_target = 10;
  }
}

message ActionState {
  string step_id = 5;
  .exa.cortex_pb.ActionStatus status = 1;
  .exa.cortex_pb.ActionSpec spec = 2;
  .exa.cortex_pb.ActionResult result = 3;
  string error = 4;
  uint32 step_version = 6;
  uint32 plan_version = 7;
}

message ActionResult {
  bool apply_existing_result = 2;
  oneof result {
    .exa.cortex_pb.ActionResultEdit edit = 1;
  }
}

message ActionDebugInfo {
  message DebugInfoEntry {
    string key = 1;
    string value = 2;
  }

  repeated .exa.cortex_pb.ActionDebugInfo.DebugInfoEntry entries = 1;
}

message ActionResultEdit {
  reserved "replacement_chunk_errors";
  reserved 13;
  string absolute_path_migrate_me_to_uri = 1;
  .exa.diff_action_pb.DiffBlock diff = 2;
  string context_prefix = 3;
  string context_suffix = 4;
  .exa.cortex_pb.ActionDebugInfo debug_info = 5;
  string prompt_id = 12;
  string completion_id = 6;
  string file_content_hash = 7;
  string absolute_uri = 8;
  repeated .exa.codeium_common_pb.CodeContextItem result_ccis = 9;
  string original_content = 10;
  bool create_file = 11;
}

message RetrievalStatus {
  uint32 total_retrieved_count = 1;
  repeated .exa.codeium_common_pb.CciWithSubrange top_retrieved_items = 2;
}

message PlanState {
  .exa.cortex_pb.PlanStatus status = 4;
  string plan_id = 1;
  .exa.cortex_pb.PlanInput plan_input = 2;
  repeated .exa.cortex_pb.ActionState actions = 3;
  .exa.cortex_pb.RetrievalStatus retrieval_status = 6;
  string error = 5;
  .exa.cortex_pb.PlanDebugInfo debug_info = 7;
}

message PlanDebugInfo {
  string raw_response = 1;
  uint32 plan_tokens = 2;
  float plan_cost = 3;
  string system_prompt = 4;
  repeated .exa.chat_pb.ChatMessagePrompt message_prompts = 5;
}

message CortexPlanConfig {
  .exa.codeium_common_pb.ChatNodeConfig model_config = 1;
  uint32 max_nominal_continuations = 2;
  uint32 max_error_continuations = 3;
}

message CortexConfig {
  bool record_telemetry = 11;
  bool add_distill_node = 6;
  .exa.codeium_common_pb.ChatNodeConfig distill_config = 10;
  .exa.codeium_common_pb.MQueryConfig m_query_config = 8;
  string m_query_model_name = 12;
  bool use_macro_planner = 1;
  .exa.cortex_pb.CortexPlanConfig macro_plan_config = 4;
  .exa.cortex_pb.PlanConfig plan_config = 9;
  .exa.cortex_pb.CortexPlanConfig code_plan_config = 5;
  bool auto_prepare_apply = 2;
  uint32 num_prepare_retries = 3;
}

message PlanConfig {
  reserved "no_augment_command";
  reserved 6;
  string plan_model_name = 1;
  uint32 max_tokens_per_plan = 2;
  float max_token_fraction = 3;
  float chat_temperature = 4;
  uint64 chat_completion_max_tokens = 5;
  bool augment_command = 9;
  .exa.codeium_common_pb.ExperimentConfig experiment_config = 7;
  .exa.codeium_common_pb.MQueryConfig m_query_config = 8;
}

message CortexPlanSummary {
  string cortex_id = 1;
  .exa.cortex_pb.PlanInput plan_input = 2;
  .google.protobuf.Timestamp created_at = 3;
  bool done = 4;
}

message WorkspaceInitializationData {
  .exa.cortex_pb.WorkspaceType workspace_type = 1;
  oneof data {
    .exa.cortex_pb.WorkspaceInitializationDataGit git = 2;
    .exa.cortex_pb.WorkspaceInitializationDataPiper piper = 3;
  }
}

message WorkspaceInitializationDataGit {
  .exa.cortex_pb.CortexWorkspaceMetadata metadata = 1;
  string merge_base_commit_hash = 2;
  .exa.codeium_common_pb.WorkspaceStats workspace_stats = 5;
  bool repo_is_public = 6;
  optional string merge_base_head_patch_string = 3;
  optional string head_working_patch_string = 4;
}

message WorkspaceInitializationDataPiper {
  string workspace_folder_absolute_uri = 1;
  int64 base_cl = 2;
  repeated .exa.cortex_pb.FileDiff file_diffs = 3;
  oneof base_state {
    int64 base_changelist = 5;
    int64 citc_snapshot_id = 4;
  }
}

message FileDiff {
  string depot_path = 1;
  oneof file_op {
    .exa.cortex_pb.FileDiffAdd add = 2;
    .exa.cortex_pb.FileDiffRemove remove = 3;
    .exa.cortex_pb.FileDiffModify modify = 4;
  }
}

message FileDiffAdd {
  string content = 1;
}

message FileDiffRemove {
}

message FileDiffModify {
  string diff = 1;
}

message StateInitializationData {
  .google.protobuf.Timestamp timestamp = 1;
  string state_id = 2;
  repeated .exa.cortex_pb.WorkspaceInitializationData workspaces = 3;
  .exa.cortex_pb.AritfactInitializationData artifacts = 4;
}

message AritfactInitializationData {
  message CompressedArtifactFilesEntry {
    string key = 1;
    bytes value = 2;
  }

  string artifact_dir_uri = 1;
  string artifact_base_dir_uri = 2;
  repeated .exa.cortex_pb.AritfactInitializationData.CompressedArtifactFilesEntry compressed_artifact_files = 3;
}

message CortexWorkspaceMetadata {
  string workspace_folder_absolute_uri = 1;
  string git_root_absolute_uri = 2;
  .exa.codeium_common_pb.Repository repository = 3;
  string branch_name = 4;
}

message AgentScriptCommandSpec {
  string command = 1;
  repeated string args = 2;
  .exa.cortex_pb.CustomizationPath work_dir = 3;
}

message AgentScriptPythonSpec {
  string main_py_path_uri = 1;
  string requirements_txt_path_uri = 2;
  string relative_path_to_main_py = 3;
  string relative_path_to_requirements_txt = 4;
}

message AgentScriptConfigPath {
  oneof config_path {
    string config_path_uri = 1;
    string relative_path_to_config = 2;
  }
}

message AgentCustomization {
  string path = 1;
  .exa.cortex_pb.AgentScriptItem agent = 2;
  bool is_global = 3;
}

message PluginCustomization {
  string path = 1;
  .exa.cortex_pb.PluginItem plugin = 2;
  bool is_global = 3;
}

message PluginItem {
  string name = 1;
  string description = 2;
  bool disabled = 3;
}

message AgentScriptItem {
  string name = 1;
  string description = 8;
  bool disabled = 9;
  bool hidden = 10;
  bool disable_model_selection = 14;
  oneof source {
    .exa.cortex_pb.AgentScriptCommandSpec command_spec = 3;
    .exa.cortex_pb.AgentScriptPythonSpec python_spec = 4;
    .exa.cortex_pb.AgentScriptConfigPath config_path = 6;
    .exa.cortex_pb.CustomAgentSpec config = 7;
    .exa.cortex_pb.CascadeConfig cascade_config = 11;
  }
  optional bool subagent = 12;
  optional bool main_agent = 13;
}

message ExecutableScriptSpec {
  oneof spec {
    .exa.cortex_pb.AgentScriptCommandSpec command_spec = 1;
    .exa.cortex_pb.AgentScriptPythonSpec python_spec = 2;
  }
}

message ToolSourceMetadata {
  string conversation_id = 1;
  int32 step_index = 2;
  .exa.codeium_common_pb.ChatToolCall tool_call = 3;
}

message SidecarUserConfig {
  message ArgumentValuesEntry {
    string key = 1;
    string value = 2;
  }

  repeated .exa.cortex_pb.SidecarUserConfig.ArgumentValuesEntry argument_values = 4;
  .exa.cortex_pb.SidecarAgentPermissions resolved_permissions = 5;
  oneof project_scope {
    string project_id = 2;
    bool all_projects = 3;
  }
  optional bool enabled = 1;
}

message SidecarArgumentDefinition {
  message StringArgument {
    string default_value = 1;
    string placeholder = 2;
  }

  string key = 1;
  string description = 2;
  oneof type {
    .exa.cortex_pb.SidecarArgumentDefinition.StringArgument string_arg = 3;
  }
}

message SidecarAgentPermissions {
  repeated string workspace_uris = 1;
  repeated string access_grants = 2;
}

message SidecarConfig {
  message EnvEntry {
    string key = 1;
    string value = 2;
  }

  string restart_policy = 2;
  repeated string args = 3;
  string description = 5;
  bool has_web_ui = 6;
  repeated .exa.cortex_pb.SidecarConfig.EnvEntry env = 7;
  string display_name = 8;
  bool disabled = 4;
  .exa.cortex_pb.SidecarUIConfig ui_config = 10;
  .exa.cortex_pb.SidecarAgentPermissions agent_permissions = 11;
  repeated .exa.cortex_pb.SidecarArgumentDefinition arguments = 12;
  oneof mode {
    string command = 1;
    string builtin = 9;
  }
}

message SidecarUIView {
  string url = 1;
  .exa.cortex_pb.SidecarUIEntrypoint entrypoint = 2;
  string path = 3;
  string title = 4;
}

message SidecarUIConfig {
  string display_name = 1;
  repeated .exa.cortex_pb.SidecarUIView views = 2;
}

message SidecarStatusInfo {
  string sidecar_id = 1;
  .exa.cortex_pb.SidecarConfig config = 2;
  .exa.cortex_pb.SidecarStatus status = 3;
  string last_error = 4;
  int64 start_time_ms = 5;
  int32 web_port = 6;
  .exa.cortex_pb.SidecarUIConfig ui_config = 7;
  string base_url = 8;
  .exa.cortex_pb.SidecarUserConfig user_config = 9;
  .exa.cortex_pb.SidecarErrorSource error_source = 10;
  bool is_bundled = 11;
}

message SidecarCommandSource {
  string sidecar_id = 1;
  .exa.cortex_pb.SidecarConfig config = 2;
}

message SourceMetadata {
  oneof payload {
    .exa.cortex_pb.ToolSourceMetadata tool = 1;
    .exa.cortex_pb.SidecarCommandSource sidecar = 2;
  }
}

message SendMessageEvent {
  string recipient_id = 1;
  string content = 2;
}

message NewConversationEvent {
  string prompt = 1;
  string conversation_id = 2;
}

message ConversationMetadataEvent {
  .exa.cortex_pb.CortexTrajectoryMetadata metadata = 1;
}

message SidecarEventPayload {
  oneof event {
    .exa.cortex_pb.SendMessageEvent send_message = 1;
    .exa.cortex_pb.NewConversationEvent new_conversation = 2;
    .exa.cortex_pb.ConversationMetadataEvent conversation_metadata = 3;
  }
}

message SidecarEvent {
  int64 timestamp_ms = 1;
  int64 command_invocation_timestamp_ms = 2;
  string error = 3;
  .exa.cortex_pb.SidecarEventPayload payload = 4;
}

message CortexTrajectoryMetadata {
  reserved 13;
  reserved 14;
  repeated .exa.cortex_pb.CortexWorkspaceMetadata workspaces = 1;
  .google.protobuf.Timestamp created_at = 2;
  string initialization_state_id = 3;
  string parent_conversation_id = 5;
  string root_conversation_id = 6;
  repeated string workspace_uris = 7;
  .exa.cortex_pb.SubagentSpec subagent_spec = 8;
  .exa.cortex_pb.CustomAgentSpec static_config = 10;
  .exa.cortex_pb.ExecutableScriptSpec executable_spec = 11;
  .exa.cortex_pb.SourceMetadata source_metadata = 12;
  repeated int32 mendel_experiment_ids = 15;
  .exa.cortex_pb.AgentScriptItem agent_script = 4;
  bool is_battle_mode_fork = 16;
  string project_id = 18;
  string environment_id = 19;
  int32 nesting_depth = 17;
  repeated string tags = 20;
  repeated .exa.cortex_pb.StringReplacement replacements = 21;
}

message StringReplacement {
  string original = 1;
  string replacement = 2;
}

message BattleModeInfo {
  message OriginalWorkspaceSnapshotsEntry {
    string key = 1;
    int32 value = 2;
  }

  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  repeated string children_conversation_ids = 1;
  string winning_conversation_id = 2;
  int32 start_step_index = 3;
  int32 end_step_index = 4;
  .google.protobuf.Timestamp start_timestamp = 5;
  .google.protobuf.Timestamp end_timestamp = 6;
  string battle_id = 7;
  repeated string children_trajectory_ids = 8;
  .exa.cortex_pb.BattleEndType end_type = 9;
  repeated .exa.codeium_common_pb.Model original_models = 13;
  repeated .exa.codeium_common_pb.Model models = 10;
  repeated .exa.cortex_pb.BattleModeInfo.OriginalWorkspaceSnapshotsEntry original_workspace_snapshots = 11;
  repeated .exa.cortex_pb.CascadeRunStatus children_trajectory_statuses = 12;
  repeated bool eliminated = 14;
  repeated .google.protobuf.Timestamp elimination_time = 15;
  bool forked_from_history = 16;
  string trigger_tag = 17;
  string reference_conversation_id = 18;
  repeated .exa.cortex_pb.BattleModeInfo.MetadataEntry metadata = 19;
}

message CortexTrajectoryReference {
  string trajectory_id = 1;
  .exa.cortex_pb.CortexTrajectoryType trajectory_type = 3;
  int32 step_index = 2;
  .exa.cortex_pb.CortexStepType step_type = 4;
  .exa.cortex_pb.CortexTrajectoryReferenceType reference_type = 5;
  string conversation_id = 6;
}

message ImplicitTrajectoryDescription {
  string trajectory_id = 1;
  .exa.cortex_pb.TrajectoryScope trajectory_scope = 2;
  bool current = 3;
}

message InjectedResponseMetadata {
}

message CortexStepGeneratorMetadata {
  reserved "parallel_rollout_generator_metadata";
  reserved 6;
  repeated uint32 step_indices = 2;
  .exa.cortex_pb.CascadePlannerConfig planner_config = 3;
  string execution_id = 4;
  string error = 5;
  repeated int32 mendel_experiment_ids = 8;
  string prompt_debug_str = 9;
  bool has_ever_used_non_google_model = 10;
  oneof metadata {
    .exa.cortex_pb.ChatModelMetadata chat_model = 1;
    .exa.cortex_pb.InjectedResponseMetadata injected = 7;
  }
}

message MessagePromptMetadata {
  uint32 message_index = 1;
  uint32 segment_index = 2;
}

message SectionJudgeCriteria {
  string name = 1;
  string description = 2;
  optional uint32 weight = 3;
}

message PromptSectionMetadata {
  enum PromptSectionSourceType {
    PROMPT_SECTION_SOURCE_TYPE_UNSPECIFIED = 0;
    PROMPT_SECTION_SOURCE_TYPE_RAW = 1;
    PROMPT_SECTION_SOURCE_TYPE_TEMPLATE = 2;
    PROMPT_SECTION_SOURCE_TYPE_INLINE_TEMPLATE = 3;
    PROMPT_SECTION_SOURCE_TYPE_TEMPLATE_OVERRIDE = 4;
  }

  .exa.cortex_pb.PromptSectionMetadata.PromptSectionSourceType source_type = 1;
  string template_key = 2;
  bool is_internal = 3;
}

message PromptSection {
  string title = 1;
  string content = 2;
  .exa.cortex_pb.PromptSectionMetadata metadata = 4;
  .exa.cortex_pb.TokenType token_type = 6;
  .exa.cortex_pb.TokenSource token_source = 7;
  string templated_content = 8;
  repeated .exa.cortex_pb.SectionJudgeCriteria criteria = 3;
  string dynamic_content = 5;
  string templated_dynamic_content = 9;
}

message RetryInfo {
  string sherlog_link = 1;
  .exa.codeium_common_pb.ModelUsageStats usage = 2;
  string error = 3;
  string trace_id = 4;
  .exa.cortex_pb.RetryReason retry_reason = 5;
  repeated .google.internal.cloud.code.v1internal.Credits consumed_credits = 6;
}

message ChatModelMetadata {
  message CustomMetadataEntry {
    string key = 1;
    string value = 2;
  }

  string system_prompt = 1;
  repeated .exa.chat_pb.ChatMessagePrompt message_prompts = 2;
  repeated .exa.cortex_pb.MessagePromptMetadata message_metadata = 10;
  .exa.codeium_common_pb.Model model = 3;
  .exa.codeium_common_pb.ModelUsageStats usage = 4;
  float model_cost = 5;
  .exa.chat_pb.ChatToolChoice tool_choice = 7;
  repeated .exa.chat_pb.ChatToolDefinition tools = 8;
  .exa.cortex_pb.ChatStartMetadata chat_start_metadata = 9;
  .google.protobuf.Duration time_to_first_token = 11;
  .google.protobuf.Duration streaming_duration = 12;
  int32 credit_cost = 13;
  uint32 retries = 14;
  .exa.codeium_common_pb.CompletionConfiguration completion_config = 15;
  repeated .exa.cortex_pb.PromptSection prompt_sections = 16;
  repeated .exa.cortex_pb.RetryInfo retry_infos = 17;
  repeated .google.internal.cloud.code.v1internal.Credits consumed_credits = 18;
  string response_model = 19;
  string response_model_full = 22;
  repeated .exa.cortex_pb.ChatModelMetadata.CustomMetadataEntry custom_metadata = 20;
  string model_display_name = 21;
  uint32 last_cache_index = 6;
}

message ContextWindowMetadata {
  int32 estimated_tokens_used = 1;
  .exa.cortex_pb.TruncationReason truncation_reason = 2;
  .exa.cortex_pb.TokenBreakdown token_breakdown = 3;
  optional int32 max_context_tokens = 4;
}

message CacheBreakpointMetadata {
  uint32 index = 1;
  .exa.chat_pb.PromptCacheOptions options = 2;
  string content_checksum = 3;
}

message ChatStartMetadata {
  .google.protobuf.Timestamp created_at = 4;
  uint32 start_step_index = 1;
  int32 checkpoint_index = 2;
  repeated uint32 steps_covered_by_checkpoint = 3;
  .google.protobuf.Duration time_since_last_invocation = 8;
  .exa.cortex_pb.ContextWindowMetadata context_window_metadata = 10;
  int32 latest_stable_message_index = 5;
  repeated .exa.cortex_pb.CacheBreakpointMetadata cache_breakpoints = 6;
  .exa.cortex_pb.CacheBreakpointMetadata system_prompt_cache = 7;
  .exa.cortex_pb.CacheRequestOptions cache_request = 9;
}

message CacheRequestOptions {
  bool enabled = 1;
  repeated uint32 cache_breakpoint_indices = 2;
}

message SnapshotMetadata {
  string user = 1;
  string workspace_id = 2;
  uint32 snapshot_version = 3;
  .exa.cortex_pb.WorkspaceType workspace_type = 4;
  string client_id = 5;
  string artifact_dir_commit_hash = 6;
}

message StatusTransition {
  .exa.cortex_pb.CortexStepStatus updated_status = 1;
  .google.protobuf.Timestamp timestamp = 2;
}

message CortexStepInternalMetadata {
  repeated .exa.cortex_pb.StatusTransition status_transitions = 1;
