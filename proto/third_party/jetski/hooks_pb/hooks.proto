syntax = "proto3";

package exa.hooks_pb;

option java_outer_classname = "Hooks";
option java_multiple_files = true;
option go_package = "google3/third_party/jetski/hooks_pb/hooks_go_proto";

import "google/protobuf/struct.proto";
import "third_party/jetski/codeium_common_pb/codeium_common.proto";
import "third_party/jetski/cortex_pb/options.proto";

message HookToolCall {
  string name = 1;
  .google.protobuf.Struct args = 2;
}

message HookSystemMessage {
  message MetadataEntry {
    string key = 1;
    string value = 2;
  }

  string system_message = 1;
  repeated .exa.hooks_pb.HookSystemMessage.MetadataEntry metadata = 2;
  repeated .exa.codeium_common_pb.Media media = 3;
}

message HookErrorMessage {
  string model_message = 1;
  string user_message = 2;
}

message HookUserMessage {
  string content = 1;
  repeated .exa.codeium_common_pb.Media media = 2;
}

message HookEphemeralMessage {
  string content = 1;
  repeated .exa.codeium_common_pb.Media media = 2;
}

message HookInjectedStep {
  string model_api_content_id = 5;
  oneof step {
    .exa.hooks_pb.HookToolCall tool_call = 1;
    string user_message = 2;
    string ephemeral_message = 3;
    .exa.hooks_pb.HookSystemMessage system_message = 4;
    .exa.hooks_pb.HookErrorMessage error_message = 6;
    .exa.hooks_pb.HookUserMessage hook_user_message = 7;
    .exa.hooks_pb.HookEphemeralMessage hook_ephemeral_message = 8;
  }
}

message HookArgsCommon {
  string conversation_id = 1;
  repeated string workspace_paths = 2;
  string transcript_path = 3;
  string artifact_directory_path = 4;
  string execution_id = 5;
  string model_name = 6;
}

message HookArgs {
  .exa.hooks_pb.HookArgsCommon common = 6;
  oneof args {
    .exa.hooks_pb.PreToolHookArgs pre_tool_hook_args = 2;
    .exa.hooks_pb.PostToolHookArgs post_tool_hook_args = 3;
    .exa.hooks_pb.PreInvocationHookArgs pre_invocation_hook_args = 1;
    .exa.hooks_pb.PostInvocationHookArgs post_invocation_hook_args = 5;
    .exa.hooks_pb.StopHookArgs stop_hook_args = 4;
    .exa.hooks_pb.SessionStartHookArgs session_start_hook_args = 7;
  }
}

message PreToolHookArgs {
  .exa.hooks_pb.HookToolCall tool_call = 1;
  int32 step_idx = 2;
}

message PreToolHookResult {
  string decision = 4;
  string reason = 5;
  .google.protobuf.Struct overwrite = 3;
  repeated string permission_overrides = 6;
  bool allow_tool = 1;
  string deny_reason = 2;
}

message PostToolHookArgs {
  int32 step_idx = 1;
  .exa.hooks_pb.HookToolCall tool_call = 2;
  string error = 3;
}

message PostToolHookResult {
}

message PreInvocationHookArgs {
  int32 invocation_num = 1;
  int32 initial_num_steps = 2;
}

message PreInvocationHookResult {
  repeated .exa.hooks_pb.HookInjectedStep inject_steps = 1;
}

message PostInvocationHookArgs {
  int32 invocation_num = 1;
  int32 initial_num_steps = 2;
}

message PostInvocationHookResult {
  repeated .exa.hooks_pb.HookInjectedStep inject_steps = 1;
  string termination_behavior = 2;
}

message StopHookArgs {
  int32 execution_num = 1;
  string termination_reason = 2;
  string error = 3;
  bool fully_idle = 4;
}

message StopHookResult {
  string decision = 1;
  string reason = 2;
}

message SessionStartHookArgs {
}

message SessionStartHookResult {
  repeated .exa.hooks_pb.HookInjectedStep inject_steps = 1;
}

